<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#f7f4ef">
  <title>Mardy · 2026 Training</title>
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg: #f7f4ef;
      --bg-card: #ffffff;
      --bg-card-alt: #f0ece4;
      --border: #e0d8cc;
      --border-strong: #c8bfb0;
      --accent: #2a5298;
      --accent-soft: #e8eef8;
      --gold: #b8860b;
      --gold-soft: #fdf6e3;
      --success: #1a7a3e;
      --success-soft: #e8f5e9;
      --text: #1a1612;
      --text-sub: #6b5d4a;
      --text-muted: #9e8f7d;
      --tab-active: #2a5298;
      --tab-inactive: #9e8f7d;
      --phase1: #d4edda;
      --phase2: #cce5ff;
      --phase3: #fff3cd;
      --phase-taper: #f8d7da;
      --phase-marathon: #e2d9f3;
      --tag-red: #c0392b;
      --tag-green: #1a7a3e;
      --tag-blue: #2a5298;
      --tag-orange: #c8631a;
    }
    
    [data-theme="dark"] {
      --bg: #0f0d0a;
      --bg-card: #1a1612;
      --bg-card-alt: #221e18;
      --border: #2a2416;
      --border-strong: #3a3020;
      --accent: #4a7fd4;
      --accent-soft: #1a2640;
      --gold: #f0c040;
      --gold-soft: #1a1508;
      --success: #40b870;
      --success-soft: #0a1f10;
      --text: #e8d5a3;
      --text-sub: #9e8a6a;
      --text-muted: #6b5d3f;
      --tab-active: #f0c040;
      --tab-inactive: #6b5d3f;
      --phase1: #1a3020;
      --phase2: #0f1f3a;
      --phase3: #2a2010;
      --phase-taper: #2a1010;
      --phase-marathon: #1a1030;
      --tag-red: #e05040;
      --tag-green: #40b870;
      --tag-blue: #4a7fd4;
      --tag-orange: #e0903a;
    }
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Georgia', serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      min-height: 100dvh;
      -webkit-font-smoothing: antialiased;
    }
    
    .mono { font-family: 'DM Mono', monospace; }
    .serif { font-family: 'Playfair Display', serif; }
    
    /* Header */
    .header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
    }
    .header-inner {
      max-width: 480px;
      margin: 0 auto;
      padding: 12px 20px 0;
    }
    .header-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }
    .header-title {
      font-size: 15px;
      font-weight: 700;
      color: var(--gold);
      font-family: 'Playfair Display', serif;
      letter-spacing: -0.01em;
    }
    .theme-toggle {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 4px 12px;
      cursor: pointer;
      font-size: 10px;
      color: var(--text-sub);
      font-family: 'DM Mono', monospace;
    }
    
    /* Tabs */
    .tabs {
      display: flex;
    }
    .tab {
      flex: 1;
      background: none;
      border: none;
      padding: 8px 0 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      border-bottom: 2px solid transparent;
      transition: border-color 0.2s;
    }
    .tab.active {
      border-bottom-color: var(--tab-active);
    }
    .tab-icon {
      font-size: 13px;
      color: var(--tab-inactive);
    }
    .tab.active .tab-icon {
      color: var(--tab-active);
    }
    .tab-label {
      font-size: 10px;
      font-family: 'DM Mono', monospace;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--tab-inactive);
    }
    .tab.active .tab-label {
      color: var(--tab-active);
    }
    
    /* Content */
    .content {
      max-width: 480px;
      margin: 0 auto;
      padding: 0 20px 60px;
    }
    
    /* Cards */
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 12px;
    }
    .card-alt {
      background: var(--bg-card-alt);
    }
    
    /* Progress bar */
    .progress-card {
      padding: 12px 16px;
      margin-bottom: 16px;
    }
    .progress-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    .progress-label {
      font-size: 10px;
      font-family: 'DM Mono', monospace;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
    }
    .progress-count {
      font-size: 12px;
      font-family: 'DM Mono', monospace;
      color: var(--accent);
      font-weight: 700;
    }
    .progress-bar {
      height: 8px;
      background: var(--bg-card-alt);
      border-radius: 4px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: var(--success);
      border-radius: 4px;
      transition: width 0.3s;
    }
    
    /* Today card */
    .today-card {
      border-left: 3px solid var(--accent);
      background: var(--bg-card-alt);
      margin-bottom: 16px;
    }
    .today-card.clickable {
      cursor: pointer;
      transition: transform 0.12s ease, box-shadow 0.12s ease;
    }
    .today-card.clickable:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(0,0,0,0.18);
    }
    .today-card.clickable:active {
      transform: translateY(0);
    }
    .today-card-cta {
      font-size: 11px;
      color: var(--text-muted);
      text-align: right;
      padding-top: 6px;
      letter-spacing: 0.3px;
    }
    .today-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }
    .today-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .today-icon {
      font-size: 22px;
    }
    .today-label-small {
      font-size: 10px;
      font-family: 'DM Mono', monospace;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 1px;
    }
    .today-label-main {
      font-size: 17px;
      font-weight: 700;
      font-family: 'Playfair Display', serif;
    }
    .today-sub {
      font-size: 10px;
      color: var(--text-muted);
      font-family: 'DM Mono', monospace;
    }
    .today-right {
      text-align: right;
    }
    .today-week {
      font-size: 11px;
      color: var(--text-muted);
      font-family: 'DM Mono', monospace;
    }
    .today-phase {
      font-size: 10px;
      color: var(--text-muted);
      font-family: 'DM Mono', monospace;
      margin-top: 2px;
    }
    .today-content {
      border-top: 1px solid var(--border);
      padding-top: 10px;
      margin-top: 12px;
    }
    .session-content {
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      line-height: 1.7;
      color: var(--text);
      white-space: pre-line;
    }
    .session-highlight {
      font-weight: 700;
    }
    .session-hr {
      color: var(--tag-red);
    }
    
    /* Stats grid */
    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 2fr;
      gap: 12px;
      margin-bottom: 16px;
    }
    .stat-card {
      text-align: center;
      padding: 12px 8px;
      margin-bottom: 0;
    }
    .stat-value {
      font-size: 18px;
      font-weight: 700;
      font-family: 'Playfair Display', serif;
    }
    .stat-value-accent { color: var(--accent); }
    .stat-value-gold { color: var(--gold); }
    .stat-label {
      font-size: 9px;
      color: var(--text-muted);
      font-family: 'DM Mono', monospace;
      margin-top: 2px;
    }
    .prs-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 6px;
    }
    .pr-card {
      text-align: center;
      padding: 12px 4px;
      margin-bottom: 0;
    }
    .pr-value {
      font-size: 14px;
      font-weight: 700;
      color: var(--gold);
      font-family: 'Playfair Display', serif;
    }
    
    /* Section headers */
    .section-header {
      font-size: 10px;
      font-family: 'DM Mono', monospace;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 8px;
      padding-left: 2px;
    }
    
    /* Milestone cards */
    .milestone-card {
      padding: 12px 16px;
      margin-bottom: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .milestone-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .milestone-emoji {
      font-size: 18px;
    }
    .milestone-label {
      font-size: 13px;
      color: var(--text);
      font-family: 'DM Mono', monospace;
    }
    .milestone-right {
      text-align: right;
    }
    .milestone-days {
      font-size: 18px;
      font-weight: 700;
      color: var(--accent);
      font-family: 'Playfair Display', serif;
      line-height: 1;
    }
    .milestone-unit {
      font-size: 9px;
      color: var(--text-muted);
      font-family: 'DM Mono', monospace;
    }
    
    /* Goals grid */
    .goals-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .goal-card {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 14px;
      margin-bottom: 0;
    }
    .goal-emoji {
      font-size: 18px;
    }
    .goal-label {
      font-size: 12px;
      color: var(--text);
      font-family: 'DM Mono', monospace;
    }
    
    /* Program Suggestion Cards */
    .ai-suggestions { margin-top: 14px; border-top: 1px solid var(--border); padding-top: 12px; }
    .ai-suggest-header { font-size: 11px; font-family: 'DM Mono', monospace; color: var(--text-muted); letter-spacing: 0.5px; text-transform: uppercase; margin-bottom: 10px; }
    .ai-suggest-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 12px; margin-bottom: 10px; }
    .ai-suggest-label { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
    .ai-suggest-reason { font-size: 12px; color: var(--text-muted); line-height: 1.5; margin-bottom: 10px; font-family: 'DM Mono', monospace; }
    .ai-suggest-diff { display: flex; align-items: center; gap: 6px; font-size: 11px; font-family: 'DM Mono', monospace; margin-bottom: 10px; flex-wrap: wrap; }
    .ai-diff-old { color: var(--tag-red); text-decoration: line-through; }
    .ai-diff-new { color: var(--success); font-weight: 600; }
    .ai-diff-arrow { color: var(--text-muted); }
    .ai-apply-btn { font-size: 11px; padding: 5px 12px; }
    .ai-applied-badge { font-size: 11px; color: var(--success); font-family: 'DM Mono', monospace; padding: 5px 0; }

    /* HR Zones */
    .zones-card {
      padding: 14px 16px;
    }
    .zone-row {
      display: grid;
      grid-template-columns: 32px 1fr 90px;
      gap: 8px;
      align-items: center;
      margin-bottom: 10px;
    }
    .zone-label {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      font-weight: 700;
    }
    .zone-bar-outer {
      height: 18px;
      border-radius: 3px;
      background: var(--bg-card-alt);
      overflow: hidden;
    }
    .zone-bar-inner {
      height: 100%;
      border-radius: 3px;
      opacity: 0.75;
      display: flex;
      align-items: center;
      padding-left: 6px;
    }
    .zone-bar-name {
      font-size: 9px;
      font-family: 'DM Mono', monospace;
      color: #fff;
      white-space: nowrap;
    }
    .zone-bpm {
      text-align: right;
    }
    .zone-bpm-value {
      font-size: 11px;
      font-weight: 700;
      color: var(--text);
      font-family: 'DM Mono', monospace;
    }
    .zone-bpm-pct {
      font-size: 9px;
      color: var(--text-muted);
      font-family: 'DM Mono', monospace;
    }
    .zone-use {
      font-size: 9px;
      color: var(--text-muted);
      font-family: 'DM Mono', monospace;
      margin-top: 2px;
    }
    .zone-rule {
      border-top: 1px solid var(--border);
      padding-top: 10px;
      margin-top: 4px;
    }
    .zone-rule-title {
      font-size: 11px;
      font-family: 'DM Mono', monospace;
      color: var(--tag-red);
      font-weight: 600;
      margin-bottom: 4px;
    }
    .zone-rule-text {
      font-size: 10px;
      font-family: 'DM Mono', monospace;
      color: var(--text-sub);
      line-height: 1.6;
    }
    
    /* Program tab */
    .phase-section {
      margin-bottom: 20px;
    }
    .phase-label {
      font-size: 11px;
      font-family: 'DM Mono', monospace;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-sub);
      margin-bottom: 8px;
      padding-left: 2px;
    }
    .weeks-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
    }
    .week-btn {
      background: var(--phase1);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 4px;
      cursor: pointer;
      text-align: center;
      position: relative;
      transition: transform 0.1s, box-shadow 0.1s;
    }
    .week-btn:active {
      transform: scale(0.97);
    }
    .week-btn.active {
      background: var(--accent);
      border-color: var(--accent);
    }
    .week-btn.past {
      opacity: 0.7;
    }
    .week-btn.complete::after {
      content: '✓';
      position: absolute;
      top: 3px;
      right: 3px;
      font-size: 10px;
      color: var(--success);
    }
    .week-num {
      font-size: 15px;
      font-weight: 700;
      font-family: 'Playfair Display', serif;
      color: var(--accent);
    }
    .week-btn.active .week-num {
      color: #fff;
    }
    .week-date {
      font-size: 9px;
      font-family: 'DM Mono', monospace;
      color: var(--text-muted);
      margin-top: 2px;
    }
    .week-btn.active .week-date {
      color: rgba(255,255,255,0.7);
    }
    .week-progress {
      font-size: 8px;
      font-family: 'DM Mono', monospace;
      margin-top: 2px;
    }
    
    /* Week view */
    .back-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-sub);
      font-size: 13px;
      font-family: 'DM Mono', monospace;
      padding: 0 0 12px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .week-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 16px;
    }
    .week-title {
      font-size: 24px;
      font-weight: 700;
      color: var(--accent);
      font-family: 'Playfair Display', serif;
    }
    .week-dates {
      font-size: 12px;
      color: var(--text-sub);
      margin-top: 2px;
    }
    .badge {
      font-size: 10px;
      font-family: 'DM Mono', monospace;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      background: var(--accent-soft);
      color: var(--accent);
      border: 1px solid var(--accent);
      border-radius: 4px;
      padding: 2px 7px;
      opacity: 0.7;
    }
    .notes-card {
      background: var(--gold-soft);
      border-color: var(--gold);
      margin-bottom: 16px;
    }
    .notes-text {
      font-size: 12px;
      font-family: 'DM Mono', monospace;
      color: var(--text-sub);
      line-height: 1.6;
      white-space: pre-line;
    }
    
    /* Session buttons */
    .session-btn {
      width: 100%;
      text-align: left;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 16px;
      margin-bottom: 8px;
      cursor: pointer;
      border-left-width: 3px;
      transition: transform 0.1s;
    }
    .session-btn:active {
      transform: scale(0.98);
    }
    .session-btn.complete {
      border-color: var(--success);
    }
    .session-btn-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .session-btn-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .session-btn-icon {
      font-size: 16px;
    }
    .session-btn-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      font-family: 'DM Mono', monospace;
    }
    .session-btn-title.empty {
      color: var(--text-muted);
    }
    .session-btn-sub {
      font-size: 10px;
      color: var(--text-muted);
      font-family: 'DM Mono', monospace;
    }
    .session-btn-arrow {
      font-size: 12px;
      color: var(--text-muted);
    }
    .session-btn-preview {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--text-sub);
      line-height: 1.6;
      white-space: pre-line;
      max-height: 60px;
      overflow: hidden;
      margin-top: 8px;
    }
    
    /* Session logger */
    .logger-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }
    .logger-icon {
      font-size: 24px;
    }
    .logger-title {
      font-size: 18px;
      font-weight: 700;
      color: var(--accent);
      font-family: 'Playfair Display', serif;
    }
    .logger-sub {
      font-size: 11px;
      color: var(--text-muted);
      font-family: 'DM Mono', monospace;
    }
    .planned-card {
      background: var(--bg-card-alt);
      margin-bottom: 16px;
    }
    .planned-label {
      font-size: 10px;
      font-family: 'DM Mono', monospace;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 8px;
    }
    
    /* Form inputs */
    .form-row {
      margin-bottom: 12px;
    }
    .form-label {
      font-size: 10px;
      color: var(--text-muted);
      font-family: 'DM Mono', monospace;
      margin-bottom: 4px;
    }
    .form-label.important {
      color: var(--tag-red);
    }
    .form-input {
      width: 100%;
      box-sizing: border-box;
      background: var(--bg-card-alt);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 10px;
      color: var(--text);
      font-size: 13px;
      font-family: 'DM Mono', monospace;
      outline: none;
    }
    .form-input:focus {
      border-color: var(--accent);
    }
    .form-input.important {
      border-color: rgba(192, 57, 43, 0.3);
    }
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .form-textarea {
      resize: vertical;
      min-height: 60px;
    }
    
    /* Zone compliance */
    .zone-compliance {
      border-radius: 6px;
      padding: 8px 12px;
      margin-bottom: 12px;
      font-size: 11px;
      font-family: 'DM Mono', monospace;
    }
    .zone-compliance.good {
      background: var(--success-soft);
      border: 1px solid var(--success);
      color: var(--success);
    }
    .zone-compliance.bad {
      background: var(--gold-soft);
      border: 1px solid var(--tag-orange);
      color: var(--tag-orange);
    }
    
    /* Exercise logger */
    .exercise-block {
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }
    .exercise-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    .exercise-name-input {
      font-weight: 600;
      width: calc(100% - 30px);
    }
    .remove-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-muted);
      font-size: 18px;
      padding: 4px;
    }
    .set-row {
      display: grid;
      grid-template-columns: 1fr 1fr 2fr auto;
      gap: 6px;
      margin-bottom: 6px;
      align-items: center;
    }
    .set-label {
      font-size: 9px;
      color: var(--text-muted);
      font-family: 'DM Mono', monospace;
      margin-bottom: 3px;
    }
    .add-set-btn {
      background: none;
      border: 1px dashed var(--border);
      border-radius: 4px;
      padding: 6px;
      width: 100%;
      color: var(--text-sub);
      font-family: 'DM Mono', monospace;

    async function flushQueue() {

    // ── Exercise PR helpers ──
    function exPRKey(name) {
      return (name || '').toLowerCase().trim().replace(/\s+/g, ' ');
    }

    function epley(weight, reps) {
      if (!weight || !reps || reps <= 0) return 0;
      if (reps === 1) return weight;
      return weight * (1 + reps / 30);
    }

    function suggestWeight(e1rm, targetReps) {
      if (!e1rm || e1rm <= 0 || !targetReps || targetReps <= 0) return null;
      const raw = e1rm / (1 + targetReps / 30);
      return Math.round(raw / 2.5) * 2.5;
    }

    function getBestE1RM(exName) {
      const key = exPRKey(exName);
      const prs = state.exercisePRs?.[key];
      if (!prs) return null;
      let best = 0;
      Object.values(prs).forEach(pr => {
        const e = epley(pr.w, pr.r);
        if (e > best) best = e;
      });
      return best > 0 ? best : null;
    }

    function getExerciseSuggestion(exName, targetReps) {
      const key = exPRKey(exName);
      const prs = state.exercisePRs?.[key];
      if (!prs || Object.keys(prs).length === 0) return null;

      const e1rm = getBestE1RM(exName);
      if (!e1rm) return null;

      // find the most recent log for context label
      let lastPR = null;
      Object.values(prs).forEach(pr => {
        if (!lastPR || pr.date > lastPR.date) lastPR = pr;
      });

      const suggested = targetReps ? suggestWeight(e1rm, targetReps) : null;
      return { e1rm: Math.round(e1rm * 10) / 10, suggested, last: lastPR };
    }

    // Returns array of new PR objects { exName, reps, weight, prev }
    function updateExercisePRs(exercises, weekNum) {
      const newPRs = [];
      if (!state.exercisePRs) state.exercisePRs = {};

      exercises.forEach(ex => {
        if (!ex.name || !ex.sets) return;
        const key = exPRKey(ex.name);
        if (!state.exercisePRs[key]) state.exercisePRs[key] = {};

        ex.sets.forEach(s => {
          const w = parseFloat(s.weight);
          const r = parseInt(s.reps);
          if (!w || !r || w <= 0 || r <= 0 || r > 20) return;

          const rStr = String(r);
          const existing = state.exercisePRs[key][rStr];
          const isNewPR = !existing || w > existing.w;

          if (isNewPR) {
            const prev = existing ? existing.w : null;
            state.exercisePRs[key][rStr] = {
              w, r,
              rpe: parseFloat(s.rpe) || null,
              date: new Date().toISOString().slice(0, 10),
              week: weekNum
            };
            newPRs.push({ exName: ex.name, reps: r, weight: w, prev });
          }
        });
      });

      localStorage.setItem('exercisePRs', JSON.stringify(state.exercisePRs));
      return newPRs;
    }

    function daysUntil(dateStr) {
      const now = new Date(); now.setHours(0,0,0,0);
      return Math.ceil((new Date(dateStr) - now) / 86400000);

    function getCurrentWeek() {
      const now = new Date(); now.setHours(0,0,0,0);

    function getPhase(wk) {

    function getWeekCompletion(wk) {
      const total = SESSION_DAYS.filter(d => getPlanned(wk, d.key)).length;
      const done = SESSION_DAYS.filter(d => getPlanned(wk, d.key) && state.completedSessions[`${wk}_${d.key}`]).length;

    // Parse exercises from planned workout text
    // Format: "Flat BP  3×3 @100 kg" or "Back Squat  4×6–8 @65–70%"
    function parseExercisesFromPlan(planText) {
      if (!planText) return [];
      
      const lines = planText.split('\n').filter(line => line.trim());
      const exercises = [];
      
      for (const line of lines) {
        // Skip non-exercise lines (notes, comments, HR instructions)
        if (line.includes('❤️') || line.includes('Zone') || line.startsWith('(') || line.includes('pace') || line.includes('jog')) continue;
        
        // Try to parse exercise format: "Exercise Name  SxR @Weight"
        // Match patterns like "3×3", "4×6–8", "3×10", "2×3 each side"
        const setsMatch = line.match(/(\d+)[×x](\d+)(?:–(\d+))?/);
        
        if (setsMatch) {
          const numSets = parseInt(setsMatch[1]);
          const targetReps = setsMatch[3] ? `${setsMatch[2]}-${setsMatch[3]}` : setsMatch[2];
          
          // Extract exercise name (everything before the sets notation)
          const nameMatch = line.match(/^(.+?)\s+\d+[×x]/);
          const name = nameMatch ? nameMatch[1].trim() : line.split(/\d+[×x]/)[0].trim();
          
          // Extract target weight if present (@100 kg, @65%, @25–30 kg)
          const weightMatch = line.match(/@([\d–\.]+\s*(?:kg|%)?)/);
          const targetWeight = weightMatch ? weightMatch[1].trim() : '';
          
          // Extract any notes in parentheses
          const notesMatch = line.match(/\(([^)]+)\)/);
          const exerciseNotes = notesMatch ? notesMatch[1] : '';
          
          // Create sets array
          const sets = [];
          for (let i = 0; i < numSets; i++) {
            sets.push({
              targetReps: targetReps,
              targetWeight: targetWeight,
              reps: '',
              weight: '',
              rpe: ''
            });
          }
          
          exercises.push({
            name: name,
            notes: exerciseNotes,
            sets: sets
          });
        }
      }
      
      return exercises;
    }

    function formatSessionContent(content, color) {
      if (!content) return '<span style="color:var(--text-muted);font-style:italic;">—</span>';
      return content.split('\n').map(line => {
        const isBig = line.includes('BENCH ATTEMPT') || line.includes('MARATHON') || line.includes('TIME TRIAL') || line.includes('TT —') || line.includes('RACE DAY');
        const isHR = line.includes('❤️') || line.includes('Zone');
        let style = '';
        if (isBig) style = `color:${color};font-weight:700;`;
        else if (isHR) style = 'color:var(--tag-red);';
        return `<div style="${style}">${escapeHtml(line)}</div>`;
      }).join('');
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;

        await renderSessionLogger();

    }

    function renderProgramWeeks() {
      const cw = getCurrentWeek();
      
      let html = `<div class="section-header">35-Week Plan</div>`;
      
      PHASE_INFO.forEach(phase => {
        const phaseColors = {
          phase1: 'var(--phase1)',
          phase2: 'var(--phase2)',
          phase3: 'var(--phase3)',
          phaseTaper: 'var(--phase-taper)',
          phaseMarathon: 'var(--phase-marathon)'
        };
        
        html += `
          <div class="phase-section">
            <div class="phase-label">${phase.label}</div>
            <div class="weeks-grid">
              ${phase.weeks.map(wk => {
                const isActive = wk === cw;
                const isPast = wk < cw;
                const { done, total } = getWeekCompletion(wk);
                const isComplete = done === total && total > 0;
                return `
                  <button class="week-btn ${isActive ? 'active' : ''} ${isPast ? 'past' : ''} ${isComplete ? 'complete' : ''}"
                    data-week="${wk}"
                    style="background:${isActive ? 'var(--accent)' : phaseColors[phase.color]}">
                    <div class="week-num">${wk}</div>
                    <div class="week-date">${WEEKS[wk]?.dates?.split('–')[0]?.trim() || ''}</div>
                    ${total > 0 ? `<div class="week-progress" style="color:${isActive ? 'rgba(255,255,255,0.7)' : done > 0 ? 'var(--success)' : 'var(--text-muted)'}">${done}/${total}</div>` : ''}
                  </button>
                `;
              }).join('')}
            </div>
          </div>
        `;
      });

      document.getElementById('program-tab').innerHTML = html;

      // Add click handlers
      document.querySelectorAll('.week-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          state.selectedWeek = parseInt(btn.dataset.week);
          state.programView = 'week';
          renderProgram();
        });
      });
    }

    function renderWeekView() {
      const wk = state.selectedWeek;
      const data = WEEKS[wk];
      const phase = getPhase(wk);

      let html = `
        <button class="back-btn" id="backToWeeks">← Back</button>
        <div class="week-header">
          <div>
            <div class="week-title">Week ${wk}</div>
            <div class="week-dates">${data.dates}</div>
          </div>
          <span class="badge">${phase.label.split('—')[0].trim()}</span>
        </div>
        ${data.notes ? `
          <div class="card notes-card">
            <div class="notes-text">${escapeHtml(data.notes)}</div>
          </div>
        ` : ''}
      `;

      SESSION_DAYS.forEach((day, i) => {
        const content = getPlanned(wk, day.key);
        const isCompleted = state.completedSessions[`${wk}_${day.key}`];
        const preview = content ? content.split('\n').slice(0, 3).join('\n') + (content.split('\n').length > 3 ? '\n…' : '') : '';

        html += `
          <button class="session-btn ${isCompleted ? 'complete' : ''}" 
            data-day="${i}"
            style="border-left-color:${content ? (isCompleted ? 'var(--success)' : day.color) : 'var(--border)'}">
            <div class="session-btn-header" ${content ? 'style="margin-bottom:8px"' : ''}>
              <div class="session-btn-left">
                <span class="session-btn-icon">${isCompleted ? '✅' : day.icon}</span>
                <div>
                  <div class="session-btn-title ${content ? '' : 'empty'}">${day.label}</div>
                  <div class="session-btn-sub">${day.sub}</div>
                </div>
              </div>
              <span class="session-btn-arrow">›</span>
            </div>
            ${content ? `<div class="session-btn-preview">${escapeHtml(preview)}</div>` : ''}
          </button>
        `;
      });

      document.getElementById('program-tab').innerHTML = html;

      document.getElementById('backToWeeks').addEventListener('click', () => {
        state.programView = 'weeks';
        renderProgram();
      });

      document.querySelectorAll('.session-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          state.selectedDayIndex = parseInt(btn.dataset.day);
          state.programView = 'session';
          renderProgram();
        });
      });
    }

    async function renderSessionLogger() {
      const wk = state.selectedWeek;
      const day = SESSION_DAYS[state.selectedDayIndex];
      const data = WEEKS[wk];
      const planned = getPlanned(wk, day.key) || '';
      const sessionKey = `${wk}_${day.key}`;
      const isRun = isRunSession(day.key);
      const isCompleted = state.completedSessions[sessionKey];

      // Load saved session data
      const savedData = await loadSession(wk, sessionKey);

      let html = `
        <button class="back-btn" id="backToWeek">← Week ${wk}</button>
        <div class="logger-header">
          <span class="logger-icon">${isCompleted ? '✅' : day.icon}</span>
          <div>
            <div class="logger-title">${day.label}</div>
            <div class="logger-sub">${day.sub}</div>
          </div>
        </div>
        ${planned ? `
          <div class="card planned-card">
            <div class="planned-label">Planned</div>
            <div class="session-content">${formatSessionContent(planned, day.color)}</div>
          </div>
        ` : ''}
        <div class="card">
          <div class="planned-label">Log Session</div>
          
          <div class="form-row" style="border-bottom:1px solid var(--border);padding-bottom:12px;margin-bottom:16px">
            <div class="form-label">Sleep Quality Last Night (1–10)</div>
            <input type="text" class="form-input" id="sleepQuality" placeholder="e.g. 7" style="width:80px" value="${savedData.sleepQuality || ''}">
          </div>
      `;

      if (isRun) {
        const isZone2 = day.key === 'easy' || day.key === 'longRun';
        html += `
          <div class="form-grid mb-12">
            <div>
              <div class="form-label">Distance (km)</div>
              <input type="text" class="form-input" id="runKm" placeholder="e.g. 5.2" value="${savedData.runKm || ''}">
            </div>
            <div>
              <div class="form-label">Avg Pace (/km)</div>
              <input type="text" class="form-input" id="runPace" placeholder="e.g. 6:10" value="${savedData.runPace || ''}">
            </div>
          </div>
          <div class="form-grid mb-12">
            <div>
              <div class="form-label ${isZone2 ? 'important' : ''}">Avg HR (bpm) ${isZone2 ? '· Zone 2 check' : ''}</div>
              <input type="text" class="form-input ${isZone2 ? 'important' : ''}" id="avgHR" placeholder="e.g. 132" value="${savedData.avgHR || ''}">
            </div>
            <div>
              <div class="form-label">Max HR (bpm)</div>
              <input type="text" class="form-input" id="maxHR" placeholder="e.g. 148" value="${savedData.maxHR || ''}">
            </div>
          </div>
          <div id="zoneCompliance"></div>
        `;
      } else {
        html += `
          <div id="exerciseContainer"></div>
          <button class="add-exercise-btn" id="addExercise">+ Add Exercise</button>
          <div id="exerciseSuggestions" class="suggestions-dropdown hidden"></div>
        `;
      }

      html += `
          <div class="form-row">
            <div class="form-label">Session RPE (1–10)</div>
            <input type="text" class="form-input" id="rpe" placeholder="e.g. 7" style="width:80px" value="${savedData.rpe || ''}">
          </div>
          <div class="form-row mb-16">
            <div class="form-label">Session Notes</div>
            <textarea class="form-input form-textarea" id="notes" placeholder="How did it feel? Any technique notes...">${savedData.notes || ''}</textarea>
          </div>
          <div class="btn-row">
            <button class="btn-primary" id="saveSession">Save Session</button>
            <button class="btn-secondary" id="askCoach">🧠 AI Coach</button>
          </div>
        </div>
        <div id="aiResponse"></div>
      `;

      document.getElementById('program-tab').innerHTML = html;

      // Event handlers
      document.getElementById('backToWeek').addEventListener('click', () => {
        state.programView = 'week';
        renderProgram();
      });

      if (isRun) {
        const avgHRInput = document.getElementById('avgHR');
        const isZone2 = day.key === 'easy' || day.key === 'longRun';
        
        avgHRInput.addEventListener('input', () => {
          if (isZone2 && avgHRInput.value) {
            const hr = parseInt(avgHRInput.value);
            const compDiv = document.getElementById('zoneCompliance');
            if (hr <= 137) {
              compDiv.innerHTML = `<div class="zone-compliance good">✓ Zone 2 compliance: ${hr} bpm is within 119–137</div>`;
            } else {
              compDiv.innerHTML = `<div class="zone-compliance bad">⚠️ HR too high: ${hr} bpm is above Zone 2 (max 137). Slow down or walk uphills.</div>`;
            }
          }
        });
        
        // Trigger initial check
        if (savedData.avgHR && isZone2) {
          avgHRInput.dispatchEvent(new Event('input'));
        }
      } else {
        // Load custom exercises from localStorage
        const defaultExercises = [
          'Flat BP', 'Incline DB Press', 'CGBP', 'Cable Fly', 'Dips',
          'Weighted Pull-Ups', 'BB Row', 'Cable Row', 'Lat Pulldown',
          'Back Squat', 'Deadlift', 'RDL', 'Leg Press', 'Hack Squat',
          'Hip Thrust', 'Nordic Curl', 'Calf Raises', 'Leg Curl',
          'DB Lateral Raise', 'Rear Delt Fly', 'Face Pull', 'OHP',
          'OH Tricep Ext', 'DB Curl', 'Hammer Curl', 'Skull Crusher',
          'Turkish Get-Up', 'Pallof Press', 'Dead Bug', 'Ab Wheel',
          'Suitcase Carry', 'Hanging Knee Raise', 'Pause Squat', 'Split Squat'
        ];
        let customExercises = JSON.parse(localStorage.getItem('customExercises') || '[]');
        const allExerciseSuggestions = [...new Set([...defaultExercises, ...customExercises])].sort();
        
        // Exercise logger - pre-populate from plan
        const parsedExercises = parseExercisesFromPlan(planned);
        
        // Use saved data if available, otherwise use parsed exercises
        let exercises;
        if (savedData.exercises && savedData.exercises.length > 0) {
          exercises = savedData.exercises;
        } else if (parsedExercises.length > 0) {
          exercises = parsedExercises;
        } else {
          exercises = [{ name: 'Exercise', notes: '', sets: [{ targetReps: '', targetWeight: '', reps: '', weight: '', rpe: '' }] }];
        }
        
        function renderExercises() {
          const container = document.getElementById('exerciseContainer');
          container.innerHTML = exercises.map((ex, exIdx) => `
            <div class="exercise-block" data-ex="${exIdx}">
              <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px;">
                <div>
                  <div style="font-size:14px;font-weight:600;color:var(--accent);font-family:'DM Mono',monospace;">${escapeHtml(ex.name)}</div>
                  ${ex.notes ? `<div style="font-size:10px;color:var(--text-muted);font-family:'DM Mono',monospace;margin-top:2px;">${escapeHtml(ex.notes)}</div>` : ''}
                  ${(() => {
                    const targetReps = ex.sets[0]?.targetReps ? parseInt(ex.sets[0].targetReps) || null : null;
                    const sug = getExerciseSuggestion(ex.name, targetReps);
                    if (!sug) return '';
                    const sugText = sug.suggested ? ` · suggest <strong>${sug.suggested} kg</strong>${targetReps ? ' for ' + targetReps + ' reps' : ''}` : '';
                    const lastText = sug.last ? `Last: ${sug.last.w} kg × ${sug.last.r}${sug.last.rpe ? ' @ RPE ' + sug.last.rpe : ''}` : '';
                    return `<div style="font-size:10px;color:var(--text-muted);font-family:'DM Mono',monospace;margin-top:3px;">${lastText}${sugText}</div>`;
                  })()}
                </div>
                <button class="remove-btn" data-remove-ex="${exIdx}" title="Remove exercise">×</button>
              </div>
              <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;padding:6px 8px;background:var(--bg-card-alt);border-radius:6px;">
                <div style="font-size:10px;color:var(--text-muted);font-family:'DM Mono',monospace;white-space:nowrap;">All sets:</div>
                <input type="text" class="form-input bulk-weight" data-bulk-ex="${exIdx}" placeholder="kg — fills all sets" style="flex:1;font-size:12px;padding:4px 8px;">
              </div>
              <div style="display:grid;grid-template-columns:32px 1fr 1fr 60px 28px;gap:6px;margin-bottom:6px;">
                <div style="font-size:9px;color:var(--text-muted);font-family:'DM Mono',monospace;">Set</div>
                <div style="font-size:9px;color:var(--text-muted);font-family:'DM Mono',monospace;">Weight</div>
                <div style="font-size:9px;color:var(--text-muted);font-family:'DM Mono',monospace;">Reps</div>
                <div style="font-size:9px;color:var(--text-muted);font-family:'DM Mono',monospace;">RPE</div>
                <div></div>
              </div>
              ${ex.sets.map((s, setIdx) => `
                <div style="display:grid;grid-template-columns:32px 1fr 1fr 60px 28px;gap:6px;margin-bottom:6px;align-items:center;">
                  <div style="font-size:12px;color:var(--text-sub);font-family:'DM Mono',monospace;text-align:center;">${setIdx + 1}</div>
                  <div>
                    <input type="text" class="form-input" data-ex="${exIdx}" data-set="${setIdx}" data-field="weight" 
                      placeholder="${s.targetWeight || 'kg'}" value="${escapeHtml(s.weight || '')}">
                  </div>
                  <div>
                    <input type="text" class="form-input" data-ex="${exIdx}" data-set="${setIdx}" data-field="reps" 
                      placeholder="${s.targetReps || 'reps'}" value="${escapeHtml(s.reps || '')}">
                  </div>
                  <div>
                    <input type="text" class="form-input" data-ex="${exIdx}" data-set="${setIdx}" data-field="rpe" 
                      placeholder="—" value="${escapeHtml(s.rpe || '')}" style="text-align:center;">
                  </div>
                  <button class="remove-btn" data-remove-set="${exIdx}-${setIdx}" style="font-size:14px;padding:2px;" title="Remove set">×</button>
                </div>
              `).join('')}
              <div style="display:flex;gap:8px;margin-top:6px;align-items:center;">
                <button class="add-set-btn" data-add-set="${exIdx}">+ Set</button>
                <button class="save-ex-btn" data-save-ex="${exIdx}" style="font-size:11px;padding:4px 10px;background:var(--success);color:#fff;border:none;border-radius:6px;cursor:pointer;font-family:'DM Mono',monospace;">💾 Save exercise</button>
                <span class="save-ex-confirm" id="save-ex-confirm-${exIdx}" style="font-size:10px;color:var(--success);opacity:0;transition:opacity 0.3s;font-family:'DM Mono',monospace;">✓ saved</span>
              </div>
            </div>
          `).join('');

          // Add event listeners for inputs
          container.querySelectorAll('[data-field]').forEach(input => {
            input.addEventListener('input', () => {
              const exIdx = parseInt(input.dataset.ex);
              const setIdx = parseInt(input.dataset.set);
              const field = input.dataset.field;
              // Normalize comma to dot for weight fields
              let val = input.value;
              if (field === 'weight') {
                val = val.replace(',', '.');
                if (val !== input.value) {
                  input.value = val;
                }
              }
              exercises[exIdx].sets[setIdx][field] = val;
            });
          });

          // Bulk weight: fill all sets for an exercise
          container.querySelectorAll('.bulk-weight').forEach(input => {
            input.addEventListener('change', () => {
              const exIdx = parseInt(input.dataset.bulkEx);
              let val = input.value.replace(',', '.').trim();
              if (!val) return;
              exercises[exIdx].sets.forEach(s => s.weight = val);
              renderExercises();
            });
          });
          
          // Add set buttons
          container.querySelectorAll('[data-add-set]').forEach(btn => {
            btn.addEventListener('click', () => {
              const exIdx = parseInt(btn.dataset.addSet);
              const lastSet = exercises[exIdx].sets[exercises[exIdx].sets.length - 1] || {};
              exercises[exIdx].sets.push({ 
                targetReps: lastSet.targetReps || '', 
                targetWeight: lastSet.targetWeight || '', 
                reps: '', 
                weight: '', 
                rpe: '' 
              });
              renderExercises();
            });
          });
          
          // Remove set buttons
          container.querySelectorAll('[data-remove-set]').forEach(btn => {
            btn.addEventListener('click', () => {
              const [exIdx, setIdx] = btn.dataset.removeSet.split('-').map(Number);
              if (exercises[exIdx].sets.length > 1) {
                exercises[exIdx].sets.splice(setIdx, 1);
                renderExercises();
              }
            });
          });
          
          // Remove exercise buttons
          container.querySelectorAll('[data-remove-ex]').forEach(btn => {
            btn.addEventListener('click', () => {
              const exIdx = parseInt(btn.dataset.removeEx);
              if (exercises.length > 1) {
                exercises.splice(exIdx, 1);
                renderExercises();
              }
            });
          });
        }

        renderExercises();
        
        // Save individual exercise buttons
        function bindSaveExButtons() {
          document.querySelectorAll('[data-save-ex]').forEach(btn => {
            btn.addEventListener('click', async () => {
              const exIdx = parseInt(btn.dataset.saveEx);
              const exList = window.getExercises ? window.getExercises() : [];
              const payload = {
                sleepQuality: document.getElementById('sleepQuality')?.value || '',
                rpe: document.getElementById('rpe')?.value || '',
                notes: document.getElementById('notes')?.value || '',
                savedAt: new Date().toISOString(),
                exercises: exList
              };
              // PR detection before save
              const exPRs = updateExercisePRs(exList, wk);
              await saveSession(wk, sessionKey, payload);
              // Mark session complete
              if (!state.completedSessions[sessionKey]) {
                state.completedSessions[sessionKey] = true;
                await saveState();
              }
              const confirm = document.getElementById('save-ex-confirm-' + exIdx);
              if (confirm) {
                confirm.style.opacity = '1';
                setTimeout(() => { confirm.style.opacity = '0'; }, 2000);
              }
              // Show PR toast
              if (exPRs.length > 0) {
                const existing = document.getElementById('prToast');
                if (existing) existing.remove();
                const toast = document.createElement('div');
                toast.id = 'prToast';
                toast.style.cssText = 'position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--gold);color:#1a1612;padding:12px 18px;border-radius:10px;font-family:DM Mono,monospace;font-size:12px;z-index:999;max-width:320px;box-shadow:0 4px 16px rgba(0,0,0,0.25);';
                toast.innerHTML = '<div style="font-weight:700;margin-bottom:6px;">🏆 New PR' + (exPRs.length > 1 ? 's' : '') + '!</div>' +
                  exPRs.map(pr => {
                    const prev = pr.prev ? ` (prev ${pr.prev} kg)` : ' (first log)';
                    return `<div>${escapeHtml(pr.exName)}: ${pr.weight} kg × ${pr.reps}${prev}</div>`;
                  }).join('');
                document.body.appendChild(toast);
                setTimeout(() => { if (toast.parentNode) toast.remove(); }, 5000);
              }
            });
          });
        }

        // Patch renderExercises to bind save buttons after render
        const _origRenderExercises = renderExercises;
        renderExercises = function() {
          _origRenderExercises();
          bindSaveExButtons();
        };
        bindSaveExButtons();

        // Add Exercise with suggestions
        const addExerciseBtn = document.getElementById('addExercise');
        const suggestionsDiv = document.getElementById('exerciseSuggestions');
        let showingSuggestions = false;
        
        function showSuggestions(filter = '') {
          const filtered = allExerciseSuggestions.filter(e => 
            e.toLowerCase().includes(filter.toLowerCase())
          ).slice(0, 10);
          
          suggestionsDiv.innerHTML = `
            <div style="padding:8px;">
              <input type="text" class="form-input" id="exerciseSearchInput" placeholder="Search or type new..." 
                value="${escapeHtml(filter)}" style="margin-bottom:8px;">
            </div>
            <div style="max-height:200px;overflow-y:auto;">
              ${filtered.map(name => `
                <div class="suggestion-item" data-name="${escapeHtml(name)}">${escapeHtml(name)}</div>
              `).join('')}
              ${filter && !filtered.some(e => e.toLowerCase() === filter.toLowerCase()) ? `
                <div class="suggestion-item suggestion-new" data-name="${escapeHtml(filter)}">
                  + Add "${escapeHtml(filter)}" as new exercise
                </div>
              ` : ''}
            </div>
          `;
          suggestionsDiv.classList.remove('hidden');
          showingSuggestions = true;
          
          // Focus search input
          const searchInput = document.getElementById('exerciseSearchInput');
          searchInput.focus();
          
          // Search input handler
          searchInput.addEventListener('input', (e) => {
            showSuggestions(e.target.value);
          });
          
          // Enter key to add custom
          searchInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && searchInput.value.trim()) {
              addNewExercise(searchInput.value.trim());
            } else if (e.key === 'Escape') {
              hideSuggestions();
            }
          });
          
          // Click on suggestion
          suggestionsDiv.querySelectorAll('.suggestion-item').forEach(item => {
            item.addEventListener('click', () => {
              addNewExercise(item.dataset.name);
            });
          });
        }
        
        function hideSuggestions() {
          suggestionsDiv.classList.add('hidden');
          showingSuggestions = false;
        }
        
        function addNewExercise(name) {
          // Save to custom exercises if not in defaults
          if (!defaultExercises.includes(name) && !customExercises.includes(name)) {
            customExercises.push(name);
            localStorage.setItem('customExercises', JSON.stringify(customExercises));
            saveState(); // sync to Supabase
          }
          
          exercises.push({
            name: name,
            notes: '',
            sets: [{ targetReps: '', targetWeight: '', reps: '', weight: '', rpe: '' }]
          });
          
          hideSuggestions();
          renderExercises();
        }
        
        addExerciseBtn.addEventListener('click', () => {
          if (showingSuggestions) {
            hideSuggestions();
          } else {
            showSuggestions();
          }
        });
        
        // Close suggestions when clicking outside — remove old listener first to prevent leaks
        if (window._suggestionClickHandler) {
          document.removeEventListener('click', window._suggestionClickHandler);
        }
        window._suggestionClickHandler = (e) => {
          if (showingSuggestions && !suggestionsDiv.contains(e.target) && e.target !== addExerciseBtn) {
            hideSuggestions();
          }
        };
        document.addEventListener('click', window._suggestionClickHandler);

        // Store exercises getter for save
        window.getExercises = () => exercises;
      }

      // Save handler
      document.getElementById('saveSession').addEventListener('click', async () => {
        const payload = {
          sleepQuality: document.getElementById('sleepQuality').value,
          rpe: document.getElementById('rpe').value,
          notes: document.getElementById('notes').value,
          savedAt: new Date().toISOString()
        };

        if (isRun) {
          payload.runKm = document.getElementById('runKm').value;
          payload.runPace = document.getElementById('runPace').value;
          payload.avgHR = document.getElementById('avgHR').value;
          payload.maxHR = document.getElementById('maxHR').value;
        } else {
          payload.exercises = window.getExercises();
        }

        await saveSession(wk, sessionKey, payload);
        state.completedSessions[sessionKey] = true;

        // PR detection after successful local save
        let newPRs = [];
        if (!isRun && payload.exercises) {
          newPRs = updateExercisePRs(payload.exercises, wk);
        }

        await saveState();

        const btn = document.getElementById('saveSession');
        if (btn) {
          btn.textContent = '✓ Saved';
          btn.classList.add('saved');
          setTimeout(() => {
            if (document.getElementById('saveSession')) {
              btn.textContent = 'Save Session';
              btn.classList.remove('saved');
            }
          }, 2000);
        }

        // Show PR toast if any new PRs
        if (newPRs.length > 0) {
          const existing = document.getElementById('prToast');
          if (existing) existing.remove();
          const toast = document.createElement('div');
          toast.id = 'prToast';
          toast.style.cssText = 'position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--gold);color:#1a1612;padding:12px 18px;border-radius:10px;font-family:DM Mono,monospace;font-size:12px;z-index:999;max-width:320px;box-shadow:0 4px 16px rgba(0,0,0,0.25);';
          toast.innerHTML = '<div style="font-weight:700;margin-bottom:6px;">🏆 New PR' + (newPRs.length > 1 ? 's' : '') + '!</div>' +
            newPRs.map(pr => {
              const prev = pr.prev ? ` (prev ${pr.prev} kg)` : ' (first log)';
              return `<div>${escapeHtml(pr.exName)}: ${pr.weight} kg × ${pr.reps}${prev}</div>`;
            }).join('');
          document.body.appendChild(toast);
          setTimeout(() => { if (toast.parentNode) toast.remove(); }, 5000);
        }
      });

      // ── Coach: Program Suggestion Builder ──
      let _suggestionCounter = 0;
      function buildCoachSuggestions({ wk, dayKey, km, avgHR, rpe, planned, exs }) {
        const suggestions = [];
        const deloadWeeks = [8,13,16,28];
        const attemptWeeks = [9,14,17,29];
        const targetWk = wk + 1;
        if (!WEEKS[targetWk]) return suggestions;
        if (deloadWeeks.includes(targetWk) || attemptWeeks.includes(targetWk)) return suggestions;

        const isZone2 = dayKey === 'easy' || dayKey === 'longRun';
        const isQuality = dayKey === 'quality';
        const isStrength = !isZone2 && !isQuality;
        const sessionLabel = { easy: 'easy run', longRun: 'long run', quality: 'quality run', upperA: 'Upper A', upperB: 'Upper B', lower: 'legs session' }[dayKey] || dayKey;

        if (isZone2 && km > 0 && planned) {
          const plannedMatch = planned.match(/^(\d+(?:\.\d+)?)/);
          const plannedKm = plannedMatch ? parseFloat(plannedMatch[1]) : 0;
          const nextPlanned = getPlanned(targetWk, dayKey);
          if (nextPlanned && plannedKm > 0) {
            const nextMatch = nextPlanned.match(/^(\d+(?:\.\d+)?)/);
            const nextKm = nextMatch ? parseFloat(nextMatch[1]) : 0;
            if (nextKm > 0) {
              // Over-performed with good metrics → bump next session
              if (km >= plannedKm * 1.1 && (avgHR <= 0 || avgHR <= 137) && (rpe === null || rpe <= 6)) {
                const suggestedKm = nextKm + 1;
                const newValue = nextPlanned.replace(/^\d+(?:\.\d+)?/, suggestedKm);
                suggestions.push({
                  id: ++_suggestionCounter,
                  ts: new Date().toISOString(),
                  label: `Bump Wk ${targetWk} ${sessionLabel}: ${nextKm} → ${suggestedKm} km`,
                  emoji: '📈',
                  reason: `You covered ${km} km vs planned ${plannedKm} km${avgHR > 0 ? ` at avg HR ${avgHR} bpm (Zone 2 ✓)` : ''}${rpe !== null ? `, RPE ${rpe}` : ''}. Session was well within capacity — a conservative +1 km step-up is appropriate.`,
                  week: targetWk,
                  sessionKey: dayKey,
                  oldValue: nextPlanned,
                  newValue
                });
              }
              // HR drifted too high → consider reducing
              else if (avgHR > 140 && km > 0 && nextKm > 4) {
                const suggestedKm = Math.max(Math.round((nextKm - 1) * 2) / 2, 5);
                const newValue = nextPlanned.replace(/^\d+(?:\.\d+)?/, suggestedKm);
                suggestions.push({
                  id: ++_suggestionCounter,
                  ts: new Date().toISOString(),
                  label: `Reduce Wk ${targetWk} ${sessionLabel}: ${nextKm} → ${suggestedKm} km`,
                  emoji: '📉',
                  reason: `Avg HR ${avgHR} bpm was above Zone 2 ceiling (137 bpm). This session accumulated more cardiovascular stress than intended — trimming Wk ${targetWk} slightly protects aerobic adaptation quality.`,
                  week: targetWk,
                  sessionKey: dayKey,
                  oldValue: nextPlanned,
                  newValue
                });
              }
            }
          }
        }

        if (isQuality && rpe !== null && rpe <= 6) {
          const nextQuality = getPlanned(targetWk, 'quality');
          if (nextQuality) {
            const intMatch = nextQuality.match(/(\d+)×(\d+)m/);
            const tempoMatch = nextQuality.match(/(\d+)\s*min\s*(continuous|@)/i);
            if (intMatch) {
              const reps = parseInt(intMatch[1]);
              const dist = intMatch[2];
              const newReps = reps + 1;
              const newValue = nextQuality.replace(`${reps}×${dist}m`, `${newReps}×${dist}m`);
              suggestions.push({
                id: ++_suggestionCounter,
                ts: new Date().toISOString(),
                label: `Add 1 rep to Wk ${targetWk} intervals: ${reps}×${dist}m → ${newReps}×${dist}m`,
                emoji: '📈',
                reason: `RPE ${rpe} on today's session shows clear capacity for progression. One extra rep at the same pace is the most conservative interval increase available.`,
                week: targetWk,
                sessionKey: 'quality',
                oldValue: nextQuality,
                newValue
              });
            } else if (tempoMatch) {
              const mins = parseInt(tempoMatch[1]);
              const newMins = mins + 3;
              const newValue = nextQuality.replace(`${mins} min`, `${newMins} min`);
              suggestions.push({
                id: ++_suggestionCounter,
                ts: new Date().toISOString(),
                label: `Extend Wk ${targetWk} tempo: ${mins} → ${newMins} min`,
                emoji: '📈',
                reason: `RPE ${rpe} indicates this tempo block was well within your lactate threshold. +3 min keeps aerobic stimulus progressing without pushing anaerobic.`,
                week: targetWk,
                sessionKey: 'quality',
                oldValue: nextQuality,
                newValue
              });
            }
          }
        }

        if (isStrength && !deloadWeeks.includes(targetWk) && !attemptWeeks.includes(targetWk)) {
          const nextPlannedGym = getPlanned(targetWk, dayKey);
          if (nextPlannedGym && exs && exs.length > 0) {
            const nextLines = nextPlannedGym.split('\n');
            const sessionLabel = { upperA: 'Upper A', upperB: 'Upper B', lower: 'Legs' }[dayKey] || dayKey;

            // ── Per-exercise analysis ──
            const exChanges = [];   // { exName, from, to, line, newLine, reason }
            const holdItems  = [];  // exercises to hold flat

            for (const ex of exs) {
              if (!ex.name || !ex.sets || ex.sets.length === 0) continue;
              const weights = ex.sets.map(s => parseFloat(s.weight)).filter(w => !isNaN(w) && w > 0);
              if (weights.length === 0) continue;

              const topWeight = Math.max(...weights);
              const setRPEs   = ex.sets.map(s => parseFloat(s.rpe)).filter(r => !isNaN(r) && r > 0);
              const avgSetRpe = setRPEs.length > 0 ? (setRPEs.reduce((a,b) => a+b,0) / setRPEs.length) : null;
              const effectiveRpe = avgSetRpe !== null ? avgSetRpe : rpe;
              if (effectiveRpe === null) continue;

              // Find matching line in next week's plan (case-insensitive substring)
              const exLower = ex.name.toLowerCase().trim();
              const matchLine = nextLines.find(line => {
                const ll = line.toLowerCase();
                return ll.includes(exLower) || exLower.split(' ').filter(w => w.length > 3).every(w => ll.includes(w));
              });
              if (!matchLine) continue;

              // Only act on kg-based weights (skip % and bodyweight)
              const wMatch = matchLine.match(/@(\d+(?:\.\d+)?)\s*kg/);
              if (!wMatch) continue;
              const plannedW = parseFloat(wMatch[1]);
              const rpeLabel = avgSetRpe !== null ? `avg set RPE ${avgSetRpe.toFixed(1)}` : `session RPE ${effectiveRpe}`;

              if (effectiveRpe <= 6) {
                const newW = plannedW + 2.5;
                const newLine = matchLine.replace(`@${wMatch[1]} kg`, `@${newW} kg`);
                exChanges.push({ exName: ex.name, from: plannedW, to: newW, line: matchLine, newLine, reason: `${rpeLabel} — capacity available` });
              } else if (effectiveRpe >= 9.5 && plannedW > topWeight) {
                const newLine = matchLine.replace(`@${wMatch[1]} kg`, `@${topWeight} kg`);
                exChanges.push({ exName: ex.name, from: plannedW, to: topWeight, line: matchLine, newLine, reason: `${rpeLabel} — at max capacity, hold flat` });
              } else if (effectiveRpe >= 9) {
                holdItems.push(`${ex.name} (${rpeLabel})`);
              }
            }

            // ── Combined bump suggestion ──
            if (exChanges.length > 0) {
              let newValue = nextPlannedGym;
              exChanges.forEach(ch => { newValue = newValue.replace(ch.line, ch.newLine); });
              const bumps   = exChanges.filter(ch => ch.to > ch.from);
              const holds   = exChanges.filter(ch => ch.to <= ch.from);
              const summary = bumps.map(ch => `📈 ${ch.exName}: ${ch.from} → ${ch.to} kg (${ch.reason})`).join('\n') +
                              (holds.length ? '\n' + holds.map(ch => `📉 ${ch.exName}: hold at ${ch.to} kg (${ch.reason})`).join('\n') : '');
              const label   = bumps.length > 0
                ? `Wk ${targetWk} ${sessionLabel}: ${bumps.length} exercise${bumps.length > 1 ? 's' : ''} bumped${holds.length ? `, ${holds.length} held` : ''}`
                : `Wk ${targetWk} ${sessionLabel}: ${holds.length} exercise${holds.length > 1 ? 's' : ''} held flat`;
              suggestions.push({
                id: ++_suggestionCounter,
                ts: new Date().toISOString(),
                label,
                emoji: bumps.length >= holds.length ? '📈' : '📉',
                reason: summary,
                week: targetWk,
                sessionKey: dayKey,
                oldValue: nextPlannedGym,
                newValue
              });
            }

            // ── Hold-only note (no apply needed — just coaching) ──
            if (holdItems.length > 0 && exChanges.length === 0) {
              suggestions.push({
                id: ++_suggestionCounter,
                ts: new Date().toISOString(),
                label: `Wk ${targetWk} ${sessionLabel}: hold weights flat`,
                emoji: '➡️',
                reason: `Max-effort sets logged on: ${holdItems.join(', ')}. The program already has progression built in — don't add to it when you hit the ceiling.`,
                week: targetWk,
                sessionKey: dayKey,
                oldValue: nextPlannedGym,
                newValue: nextPlannedGym
              });
            }
          }
        }

        // ── DELOAD SUGGESTION — strong dual fatigue signal ──
        if (isStrength && rpe !== null && rpe >= 9 && sleep !== null && sleep <= 4
            && !deloadWeeks.includes(targetWk) && !attemptWeeks.includes(targetWk)) {
          const nextPlannedGym = getPlanned(targetWk, dayKey);
          if (nextPlannedGym) {
            // Reduce all @X kg weights by 10%, round to nearest 2.5
            const newValue = nextPlannedGym.replace(/@(\d+(?:\.\d+)?)\s*kg/g, (_, w) => {
              const reduced = Math.round((parseFloat(w) * 0.9) / 2.5) * 2.5;
              return `@${reduced} kg`;
            });
            if (newValue !== nextPlannedGym) {
              const sessionLabel = { upperA: 'Upper A', upperB: 'Upper B', lower: 'Legs' }[dayKey] || dayKey;
              suggestions.push({
                id: ++_suggestionCounter,
                ts: new Date().toISOString(),
                label: `Light session Wk ${targetWk} ${sessionLabel} — fatigue flag`,
                emoji: '😴',
                reason: `Session RPE ${rpe} + sleep ${sleep}/10 is a strong combined fatigue signal. All weights reduced ~10% for Wk ${targetWk}. Recovery is where adaptation happens — one lighter week costs nothing.`,
                week: targetWk,
                sessionKey: dayKey,
                oldValue: nextPlannedGym,
                newValue
              });
            }
          }
        }

        return suggestions;
      }

      // ── Built-in Rule-Based AI Coach (no API key needed) ──
      document.getElementById('askCoach').addEventListener('click', () => {
        const btn = document.getElementById('askCoach');
        const rpe = parseFloat(document.getElementById('rpe').value) || null;
        const sleep = parseFloat(document.getElementById('sleepQuality').value) || null;
        const sessionNotes = document.getElementById('notes').value;
        const feedback = [];

        // ── MILESTONE targets per week (bench)
        const benchMilestones = {9:115, 14:120, 17:122.5, 29:127.5};
        const nextMilestone = Object.entries(benchMilestones).find(([w]) => parseInt(w) >= wk);

        if (isRun) {
          // ── RUN COACHING ──
          const km = parseFloat(document.getElementById('runKm').value) || 0;
          const avgHR = parseInt(document.getElementById('avgHR').value) || 0;
          const maxHR = parseInt(document.getElementById('maxHR').value) || 0;
          const pace = document.getElementById('runPace').value;
          const isZone2 = day.key === 'easy' || day.key === 'longRun';
          const isQuality = day.key === 'quality';

          if (isZone2) {
            if (avgHR > 0 && avgHR <= 130) feedback.push('✅ Excellent Zone 2 control — HR well within 119–137. Your aerobic base is building efficiently.');
            else if (avgHR > 0 && avgHR <= 137) feedback.push(`✅ Good Zone 2 compliance — HR within target range (119–137). Keep this discipline, it's the foundation of everything.`);
            else if (avgHR > 137 && avgHR <= 145) feedback.push('⚠️ HR slightly above Zone 2 (target 119–137). Slow down by 10–15 sec/km on the next easy run. Ego has no place in Zone 2.');
            else if (avgHR > 145) feedback.push('❌ HR too high for Zone 2 — this became a moderate session, which is the worst zone to train in. Slow to a walk on uphills next time. Zone 2 compliance trumps pace.');

            if (km > 0) {
              const planned_km = parseFloat((planned.match(/(\d+(?:\.\d+)?)\s*km/) || [])[1]) || 0;
              if (planned_km > 0 && km >= planned_km) feedback.push(`✅ Distance hit (${km} km ≥ planned ${planned_km} km). Consistent long run progression is your biggest marathon lever.`);
              else if (planned_km > 0 && km < planned_km * 0.9) feedback.push(`📏 Distance short (${km} km vs planned ${planned_km} km). If HR forced you to stop, that's the right call. Don't chase distance at the cost of Zone 2.`);
            }
          }

          if (isQuality) {
            if (avgHR > 0 && avgHR < 155) feedback.push('📊 HR suggests effort may have been too easy for a quality session. Quality runs should sit at LTHR (161–168 bpm) for tempo, or genuinely hard for intervals.');
            else if (avgHR >= 155 && avgHR <= 175) feedback.push('✅ HR in the right zone for quality work. This is where your running fitness actually improves.');
            else if (avgHR > 175) feedback.push('⚠️ HR very high — check if this was sustainable or if you went anaerobic. Quality runs should be hard but controlled.');
          }

          if (rpe !== null) {
            if (isZone2 && rpe > 6) feedback.push(`⚠️ RPE ${rpe} is high for an easy/long run — should feel like a 4–5. If it felt hard, you went too fast or are under-recovered.`);
            else if (isZone2 && rpe <= 5) feedback.push(`✅ RPE ${rpe} — exactly right for Zone 2. You should be able to hold a full conversation.`);
            else if (isQuality && rpe >= 7) feedback.push(`✅ RPE ${rpe} for a quality session — solid effort. Fergus would say: if it felt hard, it probably was quality work.`);
          }

          if (nextMilestone) {
            feedback.push(`🎯 Bench ${nextMilestone[1]} kg on Wk ${nextMilestone[0]} — stay disciplined on running volume, don't let it bleed into recovery for the gym. Polarised training: Zone 2 stays Zone 2.`);
          }

        } else {
          // ── GYM COACHING ──
          const exs = (window.getExercises ? window.getExercises() : null) || [];
          const benchEx = exs.find(e => e.name && e.name.toLowerCase().includes('bp') || (e.name && e.name.toLowerCase().includes('bench')));

          // Check bench performance
          if (benchEx && benchEx.sets.length > 0) {
            const weights = benchEx.sets.map(s => parseFloat(s.weight)).filter(w => !isNaN(w));
            const reps = benchEx.sets.map(s => parseInt(s.reps)).filter(r => !isNaN(r));
            const topWeight = Math.max(...weights);
            const totalSets = weights.length;

            // Estimate e1RM using Epley: w * (1 + r/30)
            const e1RM = weights.map((w, i) => reps[i] ? w * (1 + reps[i] / 30) : 0).reduce((a, b) => Math.max(a, b), 0);

            // Planned bench weight from program
            const plannedBenchMatch = planned.match(/@(\d+(?:\.\d+)?)\s*kg/);
            const plannedWeight = plannedBenchMatch ? parseFloat(plannedBenchMatch[1]) : null;

            if (e1RM > 0 && nextMilestone) {
              const gap = nextMilestone[1] - e1RM;
              if (gap <= 5) feedback.push(`🔥 Estimated 1RM ~${Math.round(e1RM)} kg — you're within ${Math.round(gap)} kg of your Wk ${nextMilestone[0]} target (${nextMilestone[1]} kg). Stay the course, the wave is working.`);
              else if (gap <= 12) feedback.push(`📈 Estimated 1RM ~${Math.round(e1RM)} kg vs target ${nextMilestone[1]} kg on Wk ${nextMilestone[0]}. Gap of ${Math.round(gap)} kg — achievable. Trust the wave periodisation.`);
              else feedback.push(`📊 Estimated 1RM ~${Math.round(e1RM)} kg. ${nextMilestone[1]} kg on Wk ${nextMilestone[0]} is ambitious but keep the RPE honest — if sets feel like RPE 8+, don't force weight jumps.`);
            }

            if (plannedWeight && topWeight > 0) {
              if (topWeight >= plannedWeight) feedback.push(`✅ Bench weight on target (${topWeight} kg ≥ planned ${plannedWeight} kg). Execute the plan, don't improvise upward on a whim.`);
              else if (topWeight < plannedWeight * 0.95) feedback.push(`⚠️ Bench weight below plan (${topWeight} kg vs ${plannedWeight} kg planned). If RPE was high, this is useful data — the wave may need adjusting. If it was fatigue, prioritise sleep.`);
            }
          }

          // RPE analysis
          if (rpe !== null) {
            if (rpe >= 9) feedback.push(`⚠️ RPE ${rpe} — very hard session. If this was a planned intensity week, good. If not, watch recovery: the next session should feel easier or reduce load 5–10%.`);
            else if (rpe >= 7 && rpe <= 8) feedback.push(`✅ RPE ${rpe} — solid working session. This is the sweet spot for strength development in a hypertrophy/strength block.`);
            else if (rpe <= 5) feedback.push(`💡 RPE ${rpe} — session felt easy. Either this was a deload week (correct) or you have more in the tank. On non-deload weeks, add a set or push weight slightly.`);
          }

          // Sleep impact
          if (sleep !== null && sleep <= 5) feedback.push(`😴 Sleep score ${sleep}/10 — poor sleep blunts strength by up to 10%. If this is recurring, it's your biggest performance limiter. Don't push max weights on low sleep.`);

          // Week-specific advice
          const isDeloadWeek = [8,13,16,28].includes(wk);
          const isAttemptWeek = [9,14,17,29].includes(wk);
          if (isDeloadWeek) feedback.push(`🔽 Deload week — resist the urge to add volume. The goal is to arrive at next week's attempt feeling sharp, not tired. Less is more.`);
          if (isAttemptWeek) {
            const target = benchMilestones[wk];
            feedback.push(`🏋️ Attempt week! Target: ${target} kg. Warm up with singles at 60%, 75%, 85%, then go. One attempt only — don't grind a miss, it kills confidence.`);
          }

          if (nextMilestone && !isAttemptWeek) {
            const weeksOut = parseInt(nextMilestone[0]) - wk;
            feedback.push(`🎯 ${weeksOut} weeks to ${nextMilestone[1]} kg bench on Wk ${nextMilestone[0]}. Stay ambitious — Fergus would say: if the plan doesn't scare you slightly, it's not ambitious enough.`);
          }
        }

        // Sleep catch-all
        if (sleep !== null && sleep <= 4 && !feedback.some(f => f.includes('Sleep'))) {
          feedback.push(`😴 Sleep ${sleep}/10 is a red flag. Consider dropping intensity 10–15% today — training on poor sleep increases injury risk and blunts adaptation.`);
        }

        if (feedback.length === 0) feedback.push('📋 Log your sets, reps, weight and RPE to get specific coaching feedback.');

        // Build program suggestions
        const km = isRun ? (parseFloat(document.getElementById('runKm')?.value) || 0) : 0;
        const avgHR = isRun ? (parseInt(document.getElementById('avgHR')?.value) || 0) : 0;
        const exs = !isRun ? (window.getExercises ? window.getExercises() : []) : [];
        const suggestions = buildCoachSuggestions({ wk, dayKey: day.key, km, avgHR, rpe, planned, exs });
        window._pendingSuggestions = {};
        suggestions.forEach(s => { window._pendingSuggestions[s.id] = s; });

        const suggestionsHtml = suggestions.length > 0 ? `
          <div class="ai-suggestions">
            <div class="ai-suggest-header">💡 Program adjustments</div>
            ${suggestions.map(s => `
              <div class="ai-suggest-card" id="suggest-${s.id}">
                <div class="ai-suggest-label">${s.emoji} ${escapeHtml(s.label)}</div>
                <div class="ai-suggest-reason">${s.reason.split('\n').map(l => `<div style="margin-bottom:3px;">${escapeHtml(l)}</div>`).join('')}</div>
                <div class="ai-suggest-diff">
                  <span class="ai-diff-old">${escapeHtml((s.oldValue || '').split('\n')[0])}</span>
                  <span class="ai-diff-arrow">→</span>
                  <span class="ai-diff-new">${escapeHtml((s.newValue || '').split('\n')[0])}</span>
                </div>
                <button class="btn-secondary ai-apply-btn" data-sid="${s.id}">Apply to program</button>
              </div>
            `).join('')}
          </div>
        ` : '';

        document.getElementById('aiResponse').innerHTML = `
          <div class="card ai-card">
            <div class="ai-label">🧠 Coach Feedback — Wk ${wk}</div>
            <div class="ai-text">${feedback.map(f => `<div style="margin-bottom:10px;line-height:1.5;">${f}</div>`).join('')}</div>
            ${suggestionsHtml}
          </div>
        `;

        // Apply button handlers
        document.querySelectorAll('.ai-apply-btn').forEach(btn => {
          btn.addEventListener('click', () => {
            const sid = parseInt(btn.dataset.sid);
            const s = window._pendingSuggestions[sid];
            if (!s) return;
            applyProgramUpdate(s);
            const card = document.getElementById(`suggest-${sid}`);
            if (card) {
              btn.style.display = 'none';
              const badge = document.createElement('div');
              badge.className = 'ai-applied-badge';
              badge.textContent = '✓ Applied to Wk ' + s.week;
              card.appendChild(badge);
            }
          });
        });
      });
    }

    function renderPRs() {
      const strFields = [
        { key: 'bench', label: 'Bench Press' },
        { key: 'squat', label: 'Back Squat' },
        { key: 'deadlift', label: 'Deadlift' },
      ];
      const runFields = [
        { key: 'km1', label: '1 km' },
        { key: 'mile', label: '1 Mile' },
        { key: '5k', label: '5K' },
        { key: '10k', label: '10K' },
        { key: 'hm', label: 'Half Marathon' },
        { key: 'marathon', label: 'Marathon' },
      ];

      let html = `
        <div class="prs-header">
          <div class="section-header mb-0">Personal Records</div>
          <button class="edit-btn ${state.editingPRs ? 'active' : ''}" id="toggleEdit">

          ${strFields.map(f => `
            <div class="pr-row">

              }
            </div>
          `).join('')}
        </div>

        <div class="historical-note">
