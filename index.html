        </div>

        <div class="card">
          <div class="section-header">Running</div>
          ${runFields.map(f => `
            <div class="pr-row">
              <span class="pr-label">${f.label}</span>
              ${state.editingPRs
                ? `<input type="text" class="form-input pr-input" data-run-pr="${f.key}" value="${state.runPRs[f.key] || ''}">`
                : `<span class="pr-value-display accent">${state.runPRs[f.key] || '—'}</span>`
              }
            </div>
          `).join('')}
        </div>
      `;

      // ── Exercise PR section ──
      const exPRData = state.exercisePRs || {};
      const exNames = Object.keys(exPRData).filter(k => Object.keys(exPRData[k]).length > 0).sort();
      if (exNames.length > 0) {
        html += `
          <div class="section-header mt-16">Exercise PRs</div>
          <div style="font-size:10px;color:var(--text-muted);font-family:'DM Mono',monospace;margin-bottom:10px;line-height:1.5;">
            Best weight logged per rep count. Est. 1RM via Epley formula. PRs detected automatically on save.
          </div>
        `;
        exNames.forEach(key => {
          const prs = exPRData[key];
          const loggedReps = Object.keys(prs).map(Number).sort((a,b)=>a-b);
          const bestE1RM = Math.max(...loggedReps.map(r => epley(prs[r].w, prs[r].r)));
          // Preserve known abbreviations; title-case the rest
          const ABBREVS = new Set(['bp','cgbp','rdl','tgu','db','bb','ez','oh','bw','hr','rpe','dl','hm','tt','lt','ltr']);
          const displayName = key.split(' ').map(word =>
            ABBREVS.has(word) ? word.toUpperCase() : word.charAt(0).toUpperCase() + word.slice(1)
          ).join(' ');
          html += `
            <div class="card mb-12">
              <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px;">
                <div style="font-size:13px;font-weight:600;color:var(--accent);font-family:'DM Mono',monospace;">${escapeHtml(displayName)}</div>
                <div style="font-size:10px;color:var(--text-muted);font-family:'DM Mono',monospace;">est. 1RM ~${Math.round(bestE1RM)} kg</div>
              </div>
              <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(72px,1fr));gap:6px;">
                ${loggedReps.map(r => {
                  const pr = prs[r];
                  const isRecent = pr.date >= new Date(Date.now()-14*86400000).toISOString().slice(0,10);
                  return `
                    <div style="background:var(--bg-card-alt);border-radius:6px;padding:6px 8px;text-align:center;${isRecent ? 'border:1px solid var(--gold);' : ''}">
                      <div style="font-size:9px;color:var(--text-muted);font-family:'DM Mono',monospace;">${r}RM</div>
                      <div style="font-size:13px;font-weight:600;color:var(--text);font-family:'DM Mono',monospace;">${pr.w} kg</div>
                      ${pr.rpe ? `<div style="font-size:9px;color:var(--text-muted);font-family:'DM Mono',monospace;">RPE ${pr.rpe}</div>` : ''}
                    </div>
                  `;
                }).join('')}
              </div>
              ${(() => {
                const mostRecent = Object.values(prs).reduce((best, pr) => (!best || pr.date > best.date) ? pr : best, null);
                const recentCutoff = new Date(Date.now()-14*86400000).toISOString().slice(0,10);
                const recent = mostRecent?.date >= recentCutoff;
                return `<div style="font-size:9px;color:var(--text-muted);font-family:'DM Mono',monospace;margin-top:6px;">Wk ${mostRecent?.week || '?'} · ${recent ? '<span style=\"color:var(--gold)\">✦ recent</span>' : (mostRecent?.date || '')}</div>`;
              })()}
            </div>
          `;
        });
      }

      document.getElementById('prs-tab').innerHTML = html;

      document.getElementById('toggleEdit').addEventListener('click', async () => {
        if (state.editingPRs) {
          // Save
          const bwInput = document.getElementById('bodyWeightInput');
          if (bwInput) state.bodyWeight = bwInput.value;
          
          document.querySelectorAll('[data-pr]').forEach(input => {
            state.prs[input.dataset.pr] = input.value;
          });
          document.querySelectorAll('[data-run-pr]').forEach(input => {
            state.runPRs[input.dataset.runPr] = input.value;
          });
          
          await saveState();
        }
        state.editingPRs = !state.editingPRs;
        renderPRs();
      });
    }

    function renderSettings() {
      document.getElementById('settings-tab').innerHTML = `
        <div class="section-header">Account</div>
        <div class="card mb-12">
          <div style="font-size:13px;font-family:'DM Mono',monospace;color:var(--text);margin-bottom:4px;">${currentUser?.email || '—'}</div>
          <div style="font-size:10px;color:var(--text-muted);font-family:'DM Mono',monospace;margin-bottom:14px;">Data synced to Supabase · available on all devices</div>
          <button class="btn-primary" id="signOutBtn" style="background:var(--tag-red);">Sign Out</button>
        </div>

        <div class="section-header mt-16">Offline Sync</div>
        <div class="card mb-12">
          <div style="font-size:10px;color:var(--text-muted);font-family:'DM Mono',monospace;margin-bottom:12px;line-height:1.6;">
            Sessions are saved locally the moment you tap Save — even without internet.<br>
            When you're back online, pending sessions upload automatically.<br>
            Use the button below to force-upload now.
          </div>
          <button class="btn-primary" id="uploadPendingBtn">⬆ Upload pending sessions</button>
          <div id="uploadStatus" style="font-size:11px;font-family:'DM Mono',monospace;color:var(--success);margin-top:8px;display:none;"></div>
        </div>

        <div class="section-header mt-16">Program Updates</div>
        <div class="card mb-12" id="programUpdatesCard">
          ${(state.programOverrides || []).length === 0 ? `
            <div style="font-size:11px;color:var(--text-muted);font-family:'DM Mono',monospace;line-height:1.6;">
              No program updates applied yet.<br>
              Use the AI Coach on any session to get suggestions.
            </div>
          ` : `
            <div style="font-size:10px;color:var(--text-muted);font-family:'DM Mono',monospace;margin-bottom:12px;line-height:1.6;">
              ${(state.programOverrides || []).length} update(s) applied. Undo removes the most recent one.
            </div>
            <div style="margin-bottom:12px;">
              ${[...(state.programOverrides || [])].reverse().map((o, idx) => `
                <div style="font-size:11px;font-family:'DM Mono',monospace;padding:6px 0;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:flex-start;gap:8px;">
                  <div>
                    <div style="color:var(--text);margin-bottom:2px;">${escapeHtml(o.label || '')}</div>
                    <div style="color:var(--text-muted);font-size:10px;">Wk ${o.week} · ${new Date(o.ts).toLocaleDateString('en-GB', {day:'numeric',month:'short'})}</div>
                  </div>
                  ${idx === 0 ? '<span style="font-size:10px;color:var(--accent);font-family:monospace;">← latest</span>' : ''}
                </div>
              `).join('')}
            </div>
            <button class="btn-secondary" id="undoUpdateBtn" style="color:var(--tag-red);">↩ Undo last update</button>
          `}
        </div>

      `;

      // Upload pending button
      const uploadBtn = document.getElementById('uploadPendingBtn');
      if (uploadBtn) {
        updateSyncBadge(); // set initial state
        uploadBtn.addEventListener('click', async () => {
          uploadBtn.textContent = 'Uploading…';
          uploadBtn.disabled = true;
          const remaining = await flushQueue();
          const statusDiv = document.getElementById('uploadStatus');
          if (remaining === 0) {
            statusDiv.textContent = '✓ All sessions synced to Supabase';
            statusDiv.style.color = 'var(--success)';
          } else {
            statusDiv.textContent = `⚠ ${remaining} session(s) still pending — check connection`;
            statusDiv.style.color = 'var(--tag-red)';
          }
          statusDiv.style.display = 'block';
          updateSyncBadge();
        });
      }

      const undoBtn = document.getElementById('undoUpdateBtn');
      if (undoBtn) {
        undoBtn.addEventListener('click', () => {
          const didUndo = undoLastProgramUpdate();
          if (didUndo) {
            renderSettings();
            // Refresh home if visible
            if (state.tab === 'home') renderHome();
          }
        });
      }

      document.getElementById('signOutBtn').addEventListener('click', async () => {
        await sb.auth.signOut();
      });


    }
    // ═══════════════════════════════════════════════════════════════
    function initApp() {
      // Apply theme
      document.body.dataset.theme = state.theme;
      document.getElementById('themeToggle').textContent = state.theme === 'light' ? '☽ Dark' : '☀ Light';
      setSyncDot('synced');

      // Theme toggle
      document.getElementById('themeToggle').addEventListener('click', async () => {
        state.theme = state.theme === 'light' ? 'dark' : 'light';
        document.body.dataset.theme = state.theme;
        document.getElementById('themeToggle').textContent = state.theme === 'light' ? '☽ Dark' : '☀ Light';
        document.querySelector('meta[name="theme-color"]').content = state.theme === 'light' ? '#f7f4ef' : '#0f0d0a';
        await saveState();
      });

      // Tab navigation
      document.querySelectorAll('.tab').forEach(tab => {
        tab.addEventListener('click', () => {
          document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
          tab.classList.add('active');
          document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
          document.getElementById(`${tab.dataset.tab}-tab`).classList.add('active');
          state.tab = tab.dataset.tab;
          if (state.tab === 'program') state.programView = 'weeks';
          render();
        });
      });

      render();
    }

    function showLoginScreen() {
      document.getElementById('loginScreen').style.display = 'flex';
      let isSignUp = false;

      document.getElementById('loginBtn').addEventListener('click', async () => {
        const email = document.getElementById('loginEmail').value.trim();
        const password = document.getElementById('loginPassword').value;
        const btn = document.getElementById('loginBtn');
        const errDiv = document.getElementById('loginError');
        errDiv.style.display = 'none';
        btn.disabled = true;
        btn.textContent = isSignUp ? 'Creating account…' : 'Signing in…';

        let result;
        if (isSignUp) {
          result = await sb.auth.signUp({ email, password });
        } else {
          result = await sb.auth.signInWithPassword({ email, password });
        }

        if (result.error) {
          errDiv.textContent = result.error.message;
          errDiv.style.display = 'block';
          btn.disabled = false;
          btn.textContent = isSignUp ? 'Create Account' : 'Sign In';
        }
        // Success: onAuthStateChange will handle the rest
      });

      document.getElementById('loginToggle').addEventListener('click', () => {
        isSignUp = !isSignUp;
        document.getElementById('loginBtn').textContent = isSignUp ? 'Create Account' : 'Sign In';
        document.getElementById('loginToggle').textContent = isSignUp ? 'Already have an account? Sign in' : 'No account yet? Sign up';
        document.getElementById('loginError').style.display = 'none';
      });

      // Allow Enter key
      ['loginEmail','loginPassword'].forEach(id => {
        document.getElementById(id).addEventListener('keydown', e => {
          if (e.key === 'Enter') document.getElementById('loginBtn').click();
        });
      });
    }

    function render() {
      if (state.tab === 'home') renderHome();
      else if (state.tab === 'program') renderProgram();
      else if (state.tab === 'prs') renderPRs();
      else if (state.tab === 'settings') renderSettings();
    }

    // ── Auth entry point ──
    document.addEventListener('DOMContentLoaded', async () => {
      showLoginScreen();

      let appStarted = false;

      async function startApp(user) {
        if (appStarted) return;
        currentUser = user;
        try { await loadProfile(); } catch(e) { console.warn('loadProfile error (non-fatal):', e); }
        try {
          document.getElementById('loginScreen').style.display = 'none';
          initApp();
          appStarted = true; // only set after successful init
        } catch(e) {
          console.error('initApp failed:', e);
          currentUser = null;
          document.getElementById('loginScreen').style.display = 'flex';
        }
      }

      // Fast path: restore existing session immediately (avoids hanging on onAuthStateChange)
      try {
        const { data: { session } } = await sb.auth.getSession();
        if (session?.user) await startApp(session.user);
      } catch(e) {
        console.warn('getSession failed:', e);
      }

      // Timeout fallback: if nothing happened in 6 s, show login cleanly
      setTimeout(() => {
        if (!appStarted) {
          document.getElementById('loginScreen').style.display = 'flex';
        }
      }, 6000);

      // Ongoing listener: handles sign-in, token refresh, sign-out
      sb.auth.onAuthStateChange(async (event, session) => {
        if (session?.user) {
          if (!appStarted) {
            await startApp(session.user);
          } else {
            currentUser = session.user; // token refreshed silently
          }
        } else {
          currentUser = null;
          if (appStarted) {
            // Session expired — show login without full reload
            document.getElementById('loginScreen').style.display = 'flex';
          }
        }
      });
    });
  </script>
</body>
</html>
