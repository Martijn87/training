<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#f7f4ef">
  <title>Mardy · 2026 Training</title>
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg: #f7f4ef;
      --bg-card: #ffffff;
      --bg-card-alt: #f0ece4;
      --border: #e0d8cc;
      --border-strong: #c8bfb0;
      --accent: #2a5298;
      --accent-soft: #e8eef8;
      --gold: #b8860b;
      --gold-soft: #fdf6e3;
      --success: #1a7a3e;
      --success-soft: #e8f5e9;
      --text: #1a1612;
      --text-sub: #6b5d4a;
      --text-muted: #9e8f7d;
      --tab-active: #2a5298;
      --tab-inactive: #9e8f7d;
      --phase1: #d4edda;
      --phase2: #cce5ff;
      --phase3: #fff3cd;
      --phase-taper: #f8d7da;
      --phase-marathon: #e2d9f3;
      --tag-red: #c0392b;
      --tag-green: #1a7a3e;
      --tag-blue: #2a5298;
      --tag-orange: #c8631a;
    }
    
    [data-theme="dark"] {
      --bg: #0f0d0a;
      --bg-card: #1a1612;
      --bg-card-alt: #221e18;
      --border: #2a2416;
      --border-strong: #3a3020;
      --accent: #4a7fd4;
      --accent-soft: #1a2640;
      --gold: #f0c040;
      --gold-soft: #1a1508;
      --success: #40b870;
      --success-soft: #0a1f10;
      --text: #e8d5a3;
      --text-sub: #9e8a6a;
      --text-muted: #6b5d3f;
      --tab-active: #f0c040;
      --tab-inactive: #6b5d3f;
      --phase1: #1a3020;
      --phase2: #0f1f3a;
      --phase3: #2a2010;
      --phase-taper: #2a1010;
      --phase-marathon: #1a1030;
      --tag-red: #e05040;
      --tag-green: #40b870;
      --tag-blue: #4a7fd4;
      --tag-orange: #e0903a;
    }
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Georgia', serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      min-height: 100dvh;
      -webkit-font-smoothing: antialiased;
    }
    
    .mono { font-family: 'DM Mono', monospace; }
    .serif { font-family: 'Playfair Display', serif; }
    
    /* Header */
    .header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
    }
    .header-inner {
      max-width: 480px;
      margin: 0 auto;
      padding: 12px 20px 0;
    }
    .header-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }
    .header-title {
      font-size: 15px;
      font-weight: 700;
      color: var(--gold);
      font-family: 'Playfair Display', serif;
      letter-spacing: -0.01em;
    }
    .theme-toggle {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 4px 12px;
      cursor: pointer;
      font-size: 10px;
      color: var(--text-sub);
      font-family: 'DM Mono', monospace;
    }
    
    /* Tabs */
    .tabs {
      display: flex;
    }
    .tab {
      flex: 1;
      background: none;
      border: none;
      padding: 8px 0 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      border-bottom: 2px solid transparent;
      transition: border-color 0.2s;
    }
    .tab.active {
      border-bottom-color: var(--tab-active);
    }
    .tab-icon {
      font-size: 13px;
      color: var(--tab-inactive);
    }
    .tab.active .tab-icon {
      color: var(--tab-active);
    }
    .tab-label {
      font-size: 10px;
      font-family: 'DM Mono', monospace;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--tab-inactive);
    }
    .tab.active .tab-label {
      color: var(--tab-active);
    }
    
    /* Content */
    .content {
      max-width: 480px;
      margin: 0 auto;
      padding: 0 20px 60px;
    }
    
    /* Cards */
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 12px;
    }
    .card-alt {
      background: var(--bg-card-alt);
    }
    
    /* Progress bar */
    .progress-card {
      padding: 12px 16px;
      margin-bottom: 16px;
    }
    .progress-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    .progress-label {
      font-size: 10px;
      font-family: 'DM Mono', monospace;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
    }
    .progress-count {
      font-size: 12px;
      font-family: 'DM Mono', monospace;
      color: var(--accent);
      font-weight: 700;
    }
    .progress-bar {
      height: 8px;
      background: var(--bg-card-alt);
      border-radius: 4px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: var(--success);
      border-radius: 4px;
      transition: width 0.3s;
    }
    
    /* Today card */
    .today-card {
      border-left: 3px solid var(--accent);
      background: var(--bg-card-alt);
      margin-bottom: 16px;
    }
    .today-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }
    .today-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .today-icon {
      font-size: 22px;
    }
    .today-label-small {
      font-size: 10px;
      font-family: 'DM Mono', monospace;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 1px;
    }
    .today-label-main {
      font-size: 17px;
      font-weight: 700;
      font-family: 'Playfair Display', serif;
    }
    .today-sub {
      font-size: 10px;
      color: var(--text-muted);
      font-family: 'DM Mono', monospace;
    }
    .today-right {
      text-align: right;
    }
    .today-week {
      font-size: 11px;
      color: var(--text-muted);
      font-family: 'DM Mono', monospace;
    }
    .today-phase {
      font-size: 10px;
      color: var(--text-muted);
      font-family: 'DM Mono', monospace;
      margin-top: 2px;
    }
    .today-content {
      border-top: 1px solid var(--border);
      padding-top: 10px;
      margin-top: 12px;
    }
    .session-content {
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      line-height: 1.7;
      color: var(--text);
      white-space: pre-line;
    }
    .session-highlight {
      font-weight: 700;
    }
    .session-hr {
      color: var(--tag-red);
    }
    
    /* Stats grid */
    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 2fr;
      gap: 12px;
      margin-bottom: 16px;
    }
    .stat-card {
      text-align: center;
      padding: 12px 8px;
      margin-bottom: 0;
    }
    .stat-value {
      font-size: 18px;
      font-weight: 700;
      font-family: 'Playfair Display', serif;
    }
    .stat-value-accent { color: var(--accent); }
    .stat-value-gold { color: var(--gold); }
    .stat-label {
      font-size: 9px;
      color: var(--text-muted);
      font-family: 'DM Mono', monospace;
      margin-top: 2px;
    }
    .prs-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 6px;
    }
    .pr-card {
      text-align: center;
      padding: 12px 4px;
      margin-bottom: 0;
    }
    .pr-value {
      font-size: 14px;
      font-weight: 700;
      color: var(--gold);
      font-family: 'Playfair Display', serif;
    }
    
    /* Section headers */
    .section-header {
      font-size: 10px;
      font-family: 'DM Mono', monospace;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 8px;
      padding-left: 2px;
    }
    
    /* Milestone cards */
    .milestone-card {
      padding: 12px 16px;
      margin-bottom: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .milestone-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .milestone-emoji {
      font-size: 18px;
    }
    .milestone-label {
      font-size: 13px;
      color: var(--text);
      font-family: 'DM Mono', monospace;
    }
    .milestone-right {
      text-align: right;
    }
    .milestone-days {
      font-size: 18px;
      font-weight: 700;
      color: var(--accent);
      font-family: 'Playfair Display', serif;
      line-height: 1;
    }
    .milestone-unit {
      font-size: 9px;
      color: var(--text-muted);
      font-family: 'DM Mono', monospace;
    }
    
    /* Goals grid */
    .goals-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .goal-card {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 14px;
      margin-bottom: 0;
    }
    .goal-emoji {
      font-size: 18px;
    }
    .goal-label {
      font-size: 12px;
      color: var(--text);
      font-family: 'DM Mono', monospace;
    }
    
    /* HR Zones */
    .zones-card {
      padding: 14px 16px;
    }
    .zone-row {
      display: grid;
      grid-template-columns: 32px 1fr 90px;
      gap: 8px;
      align-items: center;
      margin-bottom: 10px;
    }
    .zone-label {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      font-weight: 700;
    }
    .zone-bar-outer {
      height: 18px;
      border-radius: 3px;
      background: var(--bg-card-alt);
      overflow: hidden;
    }
    .zone-bar-inner {
      height: 100%;
      border-radius: 3px;
      opacity: 0.75;
      display: flex;
      align-items: center;
      padding-left: 6px;
    }
    .zone-bar-name {
      font-size: 9px;
      font-family: 'DM Mono', monospace;
      color: #fff;
      white-space: nowrap;
    }
    .zone-bpm {
      text-align: right;
    }
    .zone-bpm-value {
      font-size: 11px;
      font-weight: 700;
      color: var(--text);
      font-family: 'DM Mono', monospace;
    }
    .zone-bpm-pct {
      font-size: 9px;
      color: var(--text-muted);
      font-family: 'DM Mono', monospace;
    }
    .zone-use {
      font-size: 9px;
      color: var(--text-muted);
      font-family: 'DM Mono', monospace;
      margin-top: 2px;
    }
    .zone-rule {
      border-top: 1px solid var(--border);
      padding-top: 10px;
      margin-top: 4px;
    }
    .zone-rule-title {
      font-size: 11px;
      font-family: 'DM Mono', monospace;
      color: var(--tag-red);
      font-weight: 600;
      margin-bottom: 4px;
    }
    .zone-rule-text {
      font-size: 10px;
      font-family: 'DM Mono', monospace;
      color: var(--text-sub);
      line-height: 1.6;
    }
    
    /* Program tab */
    .phase-section {
      margin-bottom: 20px;
    }
    .phase-label {
      font-size: 11px;
      font-family: 'DM Mono', monospace;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-sub);
      margin-bottom: 8px;
      padding-left: 2px;
    }
    .weeks-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
    }
    .week-btn {
      background: var(--phase1);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 4px;
      cursor: pointer;
      text-align: center;
      position: relative;
      transition: transform 0.1s, box-shadow 0.1s;
    }
    .week-btn:active {
      transform: scale(0.97);
    }
    .week-btn.active {
      background: var(--accent);
      border-color: var(--accent);
    }
    .week-btn.past {
      opacity: 0.7;
    }
    .week-btn.complete::after {
      content: '✓';
      position: absolute;
      top: 3px;
      right: 3px;
      font-size: 10px;
      color: var(--success);
    }
    .week-num {
      font-size: 15px;
      font-weight: 700;
      font-family: 'Playfair Display', serif;
      color: var(--accent);
    }
    .week-btn.active .week-num {
      color: #fff;
    }
    .week-date {
      font-size: 9px;
      font-family: 'DM Mono', monospace;
      color: var(--text-muted);
      margin-top: 2px;
    }
    .week-btn.active .week-date {
      color: rgba(255,255,255,0.7);
    }
    .week-progress {
      font-size: 8px;
      font-family: 'DM Mono', monospace;
      margin-top: 2px;
    }
    
    /* Week view */
    .back-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-sub);
      font-size: 13px;
      font-family: 'DM Mono', monospace;
      padding: 0 0 12px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .week-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 16px;
    }
    .week-title {
      font-size: 24px;
      font-weight: 700;
      color: var(--accent);
      font-family: 'Playfair Display', serif;
    }
    .week-dates {
      font-size: 12px;
      color: var(--text-sub);
      margin-top: 2px;
    }
    .badge {
      font-size: 10px;
      font-family: 'DM Mono', monospace;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      background: var(--accent-soft);
      color: var(--accent);
      border: 1px solid var(--accent);
      border-radius: 4px;
      padding: 2px 7px;
      opacity: 0.7;
    }
    .notes-card {
      background: var(--gold-soft);
      border-color: var(--gold);
      margin-bottom: 16px;
    }
    .notes-text {
      font-size: 12px;
      font-family: 'DM Mono', monospace;
      color: var(--text-sub);
      line-height: 1.6;
      white-space: pre-line;
    }
    
    /* Session buttons */
    .session-btn {
      width: 100%;
      text-align: left;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 16px;
      margin-bottom: 8px;
      cursor: pointer;
      border-left-width: 3px;
      transition: transform 0.1s;
    }
    .session-btn:active {
      transform: scale(0.98);
    }
    .session-btn.complete {
      border-color: var(--success);
    }
    .session-btn-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .session-btn-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .session-btn-icon {
      font-size: 16px;
    }
    .session-btn-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      font-family: 'DM Mono', monospace;
    }
    .session-btn-title.empty {
      color: var(--text-muted);
    }
    .session-btn-sub {
      font-size: 10px;
      color: var(--text-muted);
      font-family: 'DM Mono', monospace;
    }
    .session-btn-arrow {
      font-size: 12px;
      color: var(--text-muted);
    }
    .session-btn-preview {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--text-sub);
      line-height: 1.6;
      white-space: pre-line;
      max-height: 60px;
      overflow: hidden;
      margin-top: 8px;
    }
    
    /* Session logger */
    .logger-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }
    .logger-icon {
      font-size: 24px;
    }
    .logger-title {
      font-size: 18px;
      font-weight: 700;
      color: var(--accent);
      font-family: 'Playfair Display', serif;
    }
    .logger-sub {
      font-size: 11px;
      color: var(--text-muted);
      font-family: 'DM Mono', monospace;
    }
    .planned-card {
      background: var(--bg-card-alt);
      margin-bottom: 16px;
    }
    .planned-label {
      font-size: 10px;
      font-family: 'DM Mono', monospace;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 8px;
    }
    
    /* Form inputs */
    .form-row {
      margin-bottom: 12px;
    }
    .form-label {
      font-size: 10px;
      color: var(--text-muted);
      font-family: 'DM Mono', monospace;
      margin-bottom: 4px;
    }
    .form-label.important {
      color: var(--tag-red);
    }
    .form-input {
      width: 100%;
      box-sizing: border-box;
      background: var(--bg-card-alt);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 10px;
      color: var(--text);
      font-size: 13px;
      font-family: 'DM Mono', monospace;
      outline: none;
    }
    .form-input:focus {
      border-color: var(--accent);
    }
    .form-input.important {
      border-color: rgba(192, 57, 43, 0.3);
    }
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .form-textarea {
      resize: vertical;
      min-height: 60px;
    }
    
    /* Zone compliance */
    .zone-compliance {
      border-radius: 6px;
      padding: 8px 12px;
      margin-bottom: 12px;
      font-size: 11px;
      font-family: 'DM Mono', monospace;
    }
    .zone-compliance.good {
      background: var(--success-soft);
      border: 1px solid var(--success);
      color: var(--success);
    }
    .zone-compliance.bad {
      background: var(--gold-soft);
      border: 1px solid var(--tag-orange);
      color: var(--tag-orange);
    }
    
    /* Exercise logger */
    .exercise-block {
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }
    .exercise-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    .exercise-name-input {
      font-weight: 600;
      width: calc(100% - 30px);
    }
    .remove-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-muted);
      font-size: 18px;
      padding: 4px;
    }
    .set-row {
      display: grid;
      grid-template-columns: 1fr 1fr 2fr auto;
      gap: 6px;
      margin-bottom: 6px;
      align-items: center;
    }
    .set-label {
      font-size: 9px;
      color: var(--text-muted);
      font-family: 'DM Mono', monospace;
      margin-bottom: 3px;
    }
    .add-set-btn {
      background: none;
      border: 1px dashed var(--border);
      border-radius: 4px;
      padding: 6px;
      width: 100%;
      color: var(--text-sub);
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      cursor: pointer;
    }
    .add-exercise-btn {
      background: var(--accent-soft);
      border: 1px solid var(--accent);
      border-radius: 6px;
      padding: 10px;
      width: 100%;
      color: var(--accent);
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      cursor: pointer;
      margin-bottom: 12px;
      opacity: 0.7;
    }
    
    /* Action buttons */
    .btn-row {
      display: flex;
      gap: 8px;
    }
    .btn-primary {
      flex: 1;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 12px;
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      cursor: pointer;
      letter-spacing: 0.05em;
    }
    .btn-primary.saved {
      background: var(--success);
    }
    .btn-secondary {
      flex: 1;
      background: var(--bg-card-alt);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      color: var(--gold);
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      cursor: pointer;
    }
    
    /* AI Response */
    .ai-card {
      border-color: var(--gold);
      background: var(--gold-soft);
    }
    .ai-label {
      font-size: 10px;
      font-family: 'DM Mono', monospace;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 10px;
    }
    .ai-text {
      font-size: 13px;
      color: var(--text);
      line-height: 1.7;
      white-space: pre-wrap;
    }
    
    /* PRs tab */
    .prs-header {
      display: flex;
      justify-content: space-between;
      align-items: center;

      color: var(--accent);

    .pr-input {

    }

      background: var(--gold-soft);
      border: 1px solid var(--gold);
      border-radius: 8px;

      font-size: 11px;

      color: var(--text-sub);

    .mb-16 { margin-bottom: 16px; }

      border-bottom: 1px solid var(--border);

      color: var(--accent);

      width: 100%; padding: 13px;

      if (!dot) return;
      // Don't override 'error' if there are still pending items
      const q = getQueue();
      if (status === 'synced' && q.length > 0) {
        dot.className = 'sync-dot error';
        dot.title = `${q.length} session(s) pending upload`;
      } else {
        dot.className = 'sync-dot ' + status;
        dot.title = status === 'error' ? 'Sync error — session saved locally' : '';
      }
    }

    async function loadProfile() {
      const { data, error } = await sb.from('profiles').select('*').eq('id', currentUser.id).single();
      if (error || !data) return;
      state.prs = data.prs || state.prs;
      state.runPRs = data.run_prs || state.runPRs;
      state.bodyWeight = data.body_weight || '';
      state.theme = data.theme || 'light';
      state.completedSessions = data.completed_sessions || {};
      if (data.custom_exercises) {
        localStorage.setItem('customExercises', JSON.stringify(data.custom_exercises));
      }
      document.body.dataset.theme = state.theme;
      document.getElementById('themeToggle').textContent = state.theme === 'light' ? '☽ Dark' : '☀ Light';
    }

    async function saveState() {
      if (!currentUser) {
        // fallback to localStorage if somehow not logged in
        localStorage.setItem('theme', state.theme);
        return;
      }
      setSyncDot('syncing');
      const { error } = await sb.from('profiles').upsert({
        id: currentUser.id,
        prs: state.prs,
        run_prs: state.runPRs,
        body_weight: state.bodyWeight,
        theme: state.theme,
        completed_sessions: state.completedSessions,
        custom_exercises: JSON.parse(localStorage.getItem('customExercises') || '[]'),
        updated_at: new Date().toISOString()
      });
      setSyncDot(error ? 'error' : 'synced');
    }

    async function loadSession(week, sessionKey) {
      if (!currentUser) return JSON.parse(localStorage.getItem(`session_${week}_${sessionKey}`) || '{}');
      const { data } = await sb.from('session_logs')
        .select('data').eq('user_id', currentUser.id)
        .eq('week', week).eq('session_key', sessionKey).single();
      return data?.data || {};
    }

    // ── OFFLINE QUEUE ──────────────────────────────────────────────
    const QUEUE_KEY = 'offlineQueue';

    function getQueue() {
      try { return JSON.parse(localStorage.getItem(QUEUE_KEY) || '[]'); } catch { return []; }
    }
    function setQueue(q) {
      localStorage.setItem(QUEUE_KEY, JSON.stringify(q));
      updateSyncBadge();
    }
    function addToQueue(week, sessionKey, payload) {
      const q = getQueue();
      // replace existing entry for same week+session
      const idx = q.findIndex(e => e.week === week && e.sessionKey === sessionKey);
      const entry = { week, sessionKey, payload, queuedAt: new Date().toISOString() };
      if (idx >= 0) q[idx] = entry; else q.push(entry);
      setQueue(q);
    }
    function updateSyncBadge() {
      const q = getQueue();
      const dot = document.getElementById('syncDot');
      if (!dot) return;
      if (q.length > 0) {
        dot.className = 'sync-dot error';
        dot.title = `${q.length} session(s) pending upload`;
      }
      // also update settings button if visible
      const pendingBtn = document.getElementById('uploadPendingBtn');
      if (pendingBtn) {
        pendingBtn.textContent = q.length > 0 ? `⬆ Upload ${q.length} pending session${q.length > 1 ? 's' : ''}` : '✓ All sessions synced';
        pendingBtn.disabled = q.length === 0;
      }
    }

    async function flushQueue() {
      if (!currentUser) return;
      const q = getQueue();
      if (q.length === 0) return;
      setSyncDot('syncing');
      const remaining = [];
      for (const entry of q) {
        const { error } = await sb.from('session_logs').upsert({
          user_id: currentUser.id,
          week: entry.week,
          session_key: entry.sessionKey,
          data: entry.payload,
          saved_at: new Date().toISOString()
        }, { onConflict: 'user_id,week,session_key' });
        if (error) remaining.push(entry);
      }
      setQueue(remaining);
      setSyncDot(remaining.length > 0 ? 'error' : 'synced');
      return remaining.length;
    }

    // Auto-flush when coming back online or tab becomes visible
    window.addEventListener('online', () => { if (currentUser) flushQueue(); });
    document.addEventListener('visibilitychange', () => {
      if (!document.hidden && currentUser) flushQueue();
    });

    async function saveSession(week, sessionKey, payload) {
      // Always save locally first — instant, works offline
      localStorage.setItem(`session_${week}_${sessionKey}`, JSON.stringify(payload));

      if (!currentUser) {
        addToQueue(week, sessionKey, payload);
        return;
      }

      setSyncDot('syncing');
      try {
        const { error } = await sb.from('session_logs').upsert({
          user_id: currentUser.id,
          week: week,
          session_key: sessionKey,
          data: payload,
          saved_at: new Date().toISOString()
        }, { onConflict: 'user_id,week,session_key' });

        if (error) {
          // Supabase failed — queue it for later
          addToQueue(week, sessionKey, payload);
          setSyncDot('error');
        } else {
          // Success — remove from queue if it was there
          const q = getQueue().filter(e => !(e.week === week && e.sessionKey === sessionKey));
          setQueue(q);
          setSyncDot('synced');
        }
      } catch (e) {
        // Network error — queue it
        addToQueue(week, sessionKey, payload);
        setSyncDot('error');
      }
    }

    // ═══════════════════════════════════════════════════════════════

      theme: 'light',
      tab: 'home',
      programView: 'weeks',
      selectedWeek: getCurrentWeek(),
      selectedDayIndex: 0,
      prs: {"bench":"112.5 kg","squat":"160 kg","deadlift":"200 kg"},
      runPRs: {"km1":"3:45 ⚑","mile":"6:22 ⚑","5k":"19:30 ⚑","10k":"— ⚑","hm":"1:45:00 ⚑","marathon":"4:36:00 ⚑"},
      bodyWeight: '',

    // ═══════════════════════════════════════════════════════════════
    // HELPERS
    // ═══════════════════════════════════════════════════════════════
    function daysUntil(dateStr) {
      const now = new Date(); now.setHours(0,0,0,0);
      return Math.ceil((new Date(dateStr) - now) / 86400000);
    }

    function getCurrentWeek() {
      const now = new Date(); now.setHours(0,0,0,0);
      const diff = Math.floor((now - PLAN_START) / 86400000);
      return Math.max(1, Math.min(35, Math.floor(diff / 7) + 1));
    }

    function getPhase(wk) {
      return PHASE_INFO.find(p => p.weeks.includes(wk)) || PHASE_INFO[0];
    }

    function getWeekCompletion(wk) {
      const total = SESSION_DAYS.filter(d => WEEKS[wk]?.[d.key]).length;
      const done = SESSION_DAYS.filter(d => state.completedSessions[`${wk}_${d.key}`]).length;
      return { done, total };
    }

    function isRunSession(key) {
      return ['easy', 'quality', 'longRun'].includes(key);
    }

    // Parse exercises from planned workout text
    // Format: "Flat BP  3×3 @100 kg" or "Back Squat  4×6–8 @65–70%"
    function parseExercisesFromPlan(planText) {
      if (!planText) return [];
      
      const lines = planText.split('\n').filter(line => line.trim());
      const exercises = [];
      
      for (const line of lines) {
        // Skip non-exercise lines (notes, comments, HR instructions)
        if (line.includes('❤️') || line.includes('Zone') || line.startsWith('(') || line.includes('pace') || line.includes('jog')) continue;
        
        // Try to parse exercise format: "Exercise Name  SxR @Weight"
        // Match patterns like "3×3", "4×6–8", "3×10", "2×3 each side"
        const setsMatch = line.match(/(\d+)[×x](\d+)(?:–(\d+))?/);
        
        if (setsMatch) {
          const numSets = parseInt(setsMatch[1]);
          const targetReps = setsMatch[3] ? `${setsMatch[2]}-${setsMatch[3]}` : setsMatch[2];
          
          // Extract exercise name (everything before the sets notation)
          const nameMatch = line.match(/^(.+?)\s+\d+[×x]/);
          const name = nameMatch ? nameMatch[1].trim() : line.split(/\d+[×x]/)[0].trim();
          
          // Extract target weight if present (@100 kg, @65%, @25–30 kg)
          const weightMatch = line.match(/@([\d–\.]+\s*(?:kg|%)?)/);
          const targetWeight = weightMatch ? weightMatch[1].trim() : '';
          
          // Extract any notes in parentheses
          const notesMatch = line.match(/\(([^)]+)\)/);
          const exerciseNotes = notesMatch ? notesMatch[1] : '';
          
          // Create sets array
          const sets = [];
          for (let i = 0; i < numSets; i++) {
            sets.push({
              targetReps: targetReps,
              targetWeight: targetWeight,
              reps: '',
              weight: '',
              rpe: ''
            });
          }
          
          exercises.push({
            name: name,
            notes: exerciseNotes,
            sets: sets
          });
        }
      }
      
      return exercises;
    }

    function formatSessionContent(content, color) {
      if (!content) return '<span style="color:var(--text-muted);font-style:italic;">—</span>';
      return content.split('\n').map(line => {
        const isBig = line.includes('BENCH ATTEMPT') || line.includes('MARATHON') || line.includes('TIME TRIAL') || line.includes('TT —') || line.includes('RACE DAY');
        const isHR = line.includes('❤️') || line.includes('Zone');
        let style = '';
        if (isBig) style = `color:${color};font-weight:700;`;
        else if (isHR) style = 'color:var(--tag-red);';
        return `<div style="${style}">${escapeHtml(line)}</div>`;
      }).join('');
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

        <!-- Stats -->

    async function renderProgram() {
      if (state.programView === 'weeks') {
        renderProgramWeeks();
      } else if (state.programView === 'week') {
        renderWeekView();
      } else if (state.programView === 'session') {
        await renderSessionLogger();
      }
    }

    function renderProgramWeeks() {
      const cw = getCurrentWeek();
      
      let html = `<div class="section-header">35-Week Plan</div>`;
      
      PHASE_INFO.forEach(phase => {
        const phaseColors = {
          phase1: 'var(--phase1)',
          phase2: 'var(--phase2)',
          phase3: 'var(--phase3)',
          phaseTaper: 'var(--phase-taper)',
          phaseMarathon: 'var(--phase-marathon)'
        };
        
        html += `
          <div class="phase-section">
            <div class="phase-label">${phase.label}</div>
            <div class="weeks-grid">
              ${phase.weeks.map(wk => {
                const isActive = wk === cw;
                const isPast = wk < cw;
                const { done, total } = getWeekCompletion(wk);
                const isComplete = done === total && total > 0;
                return `
                  <button class="week-btn ${isActive ? 'active' : ''} ${isPast ? 'past' : ''} ${isComplete ? 'complete' : ''}"
                    data-week="${wk}"
                    style="background:${isActive ? 'var(--accent)' : phaseColors[phase.color]}">
                    <div class="week-num">${wk}</div>
                    <div class="week-date">${WEEKS[wk]?.dates?.split('–')[0]?.trim() || ''}</div>

                  </button>
                `;

          state.selectedWeek = parseInt(btn.dataset.week);

          renderProgram();

      // Event handlers
      document.getElementById('backToWeek').addEventListener('click', () => {
        state.programView = 'week';
        renderProgram();
      });

      if (isRun) {
        const avgHRInput = document.getElementById('avgHR');
        const isZone2 = day.key === 'easy' || day.key === 'longRun';
        
        avgHRInput.addEventListener('input', () => {
          if (isZone2 && avgHRInput.value) {
            const hr = parseInt(avgHRInput.value);
            const compDiv = document.getElementById('zoneCompliance');
            if (hr <= 138) {
              compDiv.innerHTML = `<div class="zone-compliance good">✓ Zone 2 compliance: ${hr} bpm is within 120–138</div>`;
            } else {
              compDiv.innerHTML = `<div class="zone-compliance bad">⚠️ HR too high: ${hr} bpm is above Zone 2 (max 138). Slow down or walk uphills.</div>`;
            }
          }
        });
        
        // Trigger initial check
        if (savedData.avgHR && isZone2) {
          avgHRInput.dispatchEvent(new Event('input'));
        }
      } else {
        // Load custom exercises from localStorage
        const defaultExercises = [
          'Flat BP', 'Incline DB Press', 'CGBP', 'Cable Fly', 'Dips',
          'Weighted Pull-Ups', 'BB Row', 'Cable Row', 'Lat Pulldown',
          'Back Squat', 'Deadlift', 'RDL', 'Leg Press', 'Hack Squat',
          'Hip Thrust', 'Nordic Curl', 'Calf Raises', 'Leg Curl',
          'DB Lateral Raise', 'Rear Delt Fly', 'Face Pull', 'OHP',
          'OH Tricep Ext', 'DB Curl', 'Hammer Curl', 'Skull Crusher',
          'Turkish Get-Up', 'Pallof Press', 'Dead Bug', 'Ab Wheel',
          'Suitcase Carry', 'Hanging Knee Raise', 'Pause Squat', 'Split Squat'
        ];
        let customExercises = JSON.parse(localStorage.getItem('customExercises') || '[]');
        const allExerciseSuggestions = [...new Set([...defaultExercises, ...customExercises])].sort();
        
        // Exercise logger - pre-populate from plan
        const parsedExercises = parseExercisesFromPlan(planned);
        
        // Use saved data if available, otherwise use parsed exercises
        let exercises;
        if (savedData.exercises && savedData.exercises.length > 0) {
          exercises = savedData.exercises;
        } else if (parsedExercises.length > 0) {
          exercises = parsedExercises;
        } else {
          exercises = [{ name: 'Exercise', notes: '', sets: [{ targetReps: '', targetWeight: '', reps: '', weight: '', rpe: '' }] }];
        }
        
        function renderExercises() {
          const container = document.getElementById('exerciseContainer');
          container.innerHTML = exercises.map((ex, exIdx) => `
            <div class="exercise-block" data-ex="${exIdx}">
              <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px;">
                <div>
                  <div style="font-size:14px;font-weight:600;color:var(--accent);font-family:'DM Mono',monospace;">${escapeHtml(ex.name)}</div>
                  ${ex.notes ? `<div style="font-size:10px;color:var(--text-muted);font-family:'DM Mono',monospace;margin-top:2px;">${escapeHtml(ex.notes)}</div>` : ''}
                </div>
                <button class="remove-btn" data-remove-ex="${exIdx}" title="Remove exercise">×</button>
              </div>
              <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;padding:6px 8px;background:var(--bg-card-alt);border-radius:6px;">
                <div style="font-size:10px;color:var(--text-muted);font-family:'DM Mono',monospace;white-space:nowrap;">All sets:</div>
                <input type="text" class="form-input bulk-weight" data-bulk-ex="${exIdx}" placeholder="kg — fills all sets" style="flex:1;font-size:12px;padding:4px 8px;">
              </div>
              <div style="display:grid;grid-template-columns:32px 1fr 1fr 60px 28px;gap:6px;margin-bottom:6px;">
                <div style="font-size:9px;color:var(--text-muted);font-family:'DM Mono',monospace;">Set</div>
                <div style="font-size:9px;color:var(--text-muted);font-family:'DM Mono',monospace;">Weight</div>
                <div style="font-size:9px;color:var(--text-muted);font-family:'DM Mono',monospace;">Reps</div>
                <div style="font-size:9px;color:var(--text-muted);font-family:'DM Mono',monospace;">RPE</div>
                <div></div>
              </div>
              ${ex.sets.map((s, setIdx) => `
                <div style="display:grid;grid-template-columns:32px 1fr 1fr 60px 28px;gap:6px;margin-bottom:6px;align-items:center;">
                  <div style="font-size:12px;color:var(--text-sub);font-family:'DM Mono',monospace;text-align:center;">${setIdx + 1}</div>
                  <div>
                    <input type="text" class="form-input" data-ex="${exIdx}" data-set="${setIdx}" data-field="weight" 
                      placeholder="${s.targetWeight || 'kg'}" value="${escapeHtml(s.weight || '')}">
                  </div>
                  <div>
                    <input type="text" class="form-input" data-ex="${exIdx}" data-set="${setIdx}" data-field="reps" 
                      placeholder="${s.targetReps || 'reps'}" value="${escapeHtml(s.reps || '')}">
                  </div>
                  <div>
                    <input type="text" class="form-input" data-ex="${exIdx}" data-set="${setIdx}" data-field="rpe" 
                      placeholder="—" value="${escapeHtml(s.rpe || '')}" style="text-align:center;">
                  </div>
                  <button class="remove-btn" data-remove-set="${exIdx}-${setIdx}" style="font-size:14px;padding:2px;" title="Remove set">×</button>
                </div>
              `).join('')}
              <div style="display:flex;gap:8px;margin-top:6px;align-items:center;">
                <button class="add-set-btn" data-add-set="${exIdx}">+ Set</button>
                <button class="save-ex-btn" data-save-ex="${exIdx}" style="font-size:11px;padding:4px 10px;background:var(--success);color:#fff;border:none;border-radius:6px;cursor:pointer;font-family:'DM Mono',monospace;">💾 Save exercise</button>
                <span class="save-ex-confirm" id="save-ex-confirm-${exIdx}" style="font-size:10px;color:var(--success);opacity:0;transition:opacity 0.3s;font-family:'DM Mono',monospace;">✓ saved</span>
              </div>
            </div>
          `).join('');

          // Add event listeners for inputs
          container.querySelectorAll('[data-field]').forEach(input => {
            input.addEventListener('input', () => {
              const exIdx = parseInt(input.dataset.ex);
              const setIdx = parseInt(input.dataset.set);
              const field = input.dataset.field;
              // Normalize comma to dot for weight fields
              let val = input.value;
              if (field === 'weight') {
                val = val.replace(',', '.');
                if (val !== input.value) {
                  input.value = val;
                }
              }
              exercises[exIdx].sets[setIdx][field] = val;
            });
          });

          // Bulk weight: fill all sets for an exercise
          container.querySelectorAll('.bulk-weight').forEach(input => {
            input.addEventListener('change', () => {
              const exIdx = parseInt(input.dataset.bulkEx);
              let val = input.value.replace(',', '.').trim();
              if (!val) return;
              exercises[exIdx].sets.forEach(s => s.weight = val);
              renderExercises();
            });
          });
          
          // Add set buttons
          container.querySelectorAll('[data-add-set]').forEach(btn => {
            btn.addEventListener('click', () => {
              const exIdx = parseInt(btn.dataset.addSet);
              const lastSet = exercises[exIdx].sets[exercises[exIdx].sets.length - 1] || {};
              exercises[exIdx].sets.push({ 
                targetReps: lastSet.targetReps || '', 
                targetWeight: lastSet.targetWeight || '', 
                reps: '', 
                weight: '', 
                rpe: '' 
              });
              renderExercises();
            });
          });
          
          // Remove set buttons
          container.querySelectorAll('[data-remove-set]').forEach(btn => {
            btn.addEventListener('click', () => {
              const [exIdx, setIdx] = btn.dataset.removeSet.split('-').map(Number);
              if (exercises[exIdx].sets.length > 1) {
                exercises[exIdx].sets.splice(setIdx, 1);
                renderExercises();
              }
            });
          });
          
          // Remove exercise buttons
          container.querySelectorAll('[data-remove-ex]').forEach(btn => {
            btn.addEventListener('click', () => {
              const exIdx = parseInt(btn.dataset.removeEx);
              if (exercises.length > 1) {
                exercises.splice(exIdx, 1);
                renderExercises();
              }
            });
          });
        }

        renderExercises();
        
        // Save individual exercise buttons
        function bindSaveExButtons() {
          document.querySelectorAll('[data-save-ex]').forEach(btn => {
            btn.addEventListener('click', async () => {
              const exIdx = parseInt(btn.dataset.saveEx);
              const payload = {
                sleepQuality: document.getElementById('sleepQuality')?.value || '',
                rpe: document.getElementById('rpe')?.value || '',
                notes: document.getElementById('notes')?.value || '',
                savedAt: new Date().toISOString(),
                exercises: window.getExercises()
              };
              await saveSession(wk, sessionKey, payload);
              const confirm = document.getElementById('save-ex-confirm-' + exIdx);
              if (confirm) {
                confirm.style.opacity = '1';
                setTimeout(() => { confirm.style.opacity = '0'; }, 2000);
              }
            });
          });
        }

        // Patch renderExercises to bind save buttons after render
        const _origRenderExercises = renderExercises;
        renderExercises = function() {
          _origRenderExercises();
          bindSaveExButtons();
        };
        bindSaveExButtons();

        // Add Exercise with suggestions
        const addExerciseBtn = document.getElementById('addExercise');
        const suggestionsDiv = document.getElementById('exerciseSuggestions');
        let showingSuggestions = false;
        
        function showSuggestions(filter = '') {
          const filtered = allExerciseSuggestions.filter(e => 
            e.toLowerCase().includes(filter.toLowerCase())
          ).slice(0, 10);
          
          suggestionsDiv.innerHTML = `
            <div style="padding:8px;">
              <input type="text" class="form-input" id="exerciseSearchInput" placeholder="Search or type new..." 
                value="${escapeHtml(filter)}" style="margin-bottom:8px;">
            </div>
            <div style="max-height:200px;overflow-y:auto;">
              ${filtered.map(name => `
                <div class="suggestion-item" data-name="${escapeHtml(name)}">${escapeHtml(name)}</div>
              `).join('')}
              ${filter && !filtered.some(e => e.toLowerCase() === filter.toLowerCase()) ? `
                <div class="suggestion-item suggestion-new" data-name="${escapeHtml(filter)}">
                  + Add "${escapeHtml(filter)}" as new exercise
                </div>
              ` : ''}
            </div>
          `;
          suggestionsDiv.classList.remove('hidden');
          showingSuggestions = true;
          
          // Focus search input
          const searchInput = document.getElementById('exerciseSearchInput');
          searchInput.focus();
          
          // Search input handler
          searchInput.addEventListener('input', (e) => {
            showSuggestions(e.target.value);
          });
          
          // Enter key to add custom
          searchInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && searchInput.value.trim()) {
              addNewExercise(searchInput.value.trim());
            } else if (e.key === 'Escape') {
              hideSuggestions();
            }
          });
          
          // Click on suggestion
          suggestionsDiv.querySelectorAll('.suggestion-item').forEach(item => {
            item.addEventListener('click', () => {
              addNewExercise(item.dataset.name);
            });
          });
        }
        
        function hideSuggestions() {
          suggestionsDiv.classList.add('hidden');
          showingSuggestions = false;
        }
        
        function addNewExercise(name) {
          // Save to custom exercises if not in defaults
          if (!defaultExercises.includes(name) && !customExercises.includes(name)) {
            customExercises.push(name);
            localStorage.setItem('customExercises', JSON.stringify(customExercises));
            saveState(); // sync to Supabase
          }
          
          exercises.push({
            name: name,
            notes: '',
            sets: [{ targetReps: '', targetWeight: '', reps: '', weight: '', rpe: '' }]
          });
          
          hideSuggestions();
          renderExercises();
        }
        
        addExerciseBtn.addEventListener('click', () => {
          if (showingSuggestions) {
            hideSuggestions();
          } else {
            showSuggestions();
          }
        });
        
        // Close suggestions when clicking outside
        document.addEventListener('click', (e) => {
          if (showingSuggestions && !suggestionsDiv.contains(e.target) && e.target !== addExerciseBtn) {
            hideSuggestions();
          }
        });

        // Store exercises getter for save
        window.getExercises = () => exercises;
      }

      // Save handler
      document.getElementById('saveSession').addEventListener('click', async () => {
        const payload = {
          sleepQuality: document.getElementById('sleepQuality').value,
          rpe: document.getElementById('rpe').value,
          notes: document.getElementById('notes').value,
          savedAt: new Date().toISOString()
        };

        if (isRun) {
          payload.runKm = document.getElementById('runKm').value;
          payload.runPace = document.getElementById('runPace').value;
          payload.avgHR = document.getElementById('avgHR').value;
          payload.maxHR = document.getElementById('maxHR').value;
        } else {
          payload.exercises = window.getExercises();
        }

        await saveSession(wk, sessionKey, payload);
        state.completedSessions[sessionKey] = true;
        await saveState();

        const btn = document.getElementById('saveSession');
        btn.textContent = '✓ Saved';
        btn.classList.add('saved');
        setTimeout(() => {
          btn.textContent = 'Save Session';
          btn.classList.remove('saved');
        }, 2000);
      });

      // ── Built-in Rule-Based AI Coach (no API key needed) ──
      document.getElementById('askCoach').addEventListener('click', () => {
        const btn = document.getElementById('askCoach');
        const rpe = parseFloat(document.getElementById('rpe').value) || null;
        const sleep = parseFloat(document.getElementById('sleepQuality').value) || null;
        const sessionNotes = document.getElementById('notes').value;
        const feedback = [];

        // ── MILESTONE targets per week (bench)
        const benchMilestones = {9:115, 14:120, 17:122.5, 29:127.5};
        const nextMilestone = Object.entries(benchMilestones).find(([w]) => parseInt(w) >= wk);

        if (isRun) {
          // ── RUN COACHING ──
          const km = parseFloat(document.getElementById('runKm').value) || 0;
          const avgHR = parseInt(document.getElementById('avgHR').value) || 0;
          const maxHR = parseInt(document.getElementById('maxHR').value) || 0;
          const pace = document.getElementById('runPace').value;
          const isZone2 = day.key === 'easy' || day.key === 'longRun';
          const isQuality = day.key === 'quality';

          if (isZone2) {
            if (avgHR > 0 && avgHR <= 130) feedback.push('✅ Excellent Zone 2 control — HR well within 120–138. Your aerobic base is building efficiently.');
            else if (avgHR > 0 && avgHR <= 138) feedback.push('✅ Good Zone 2 compliance — HR within target range (120–138). Keep this discipline, it's the foundation of everything.');
            else if (avgHR > 138 && avgHR <= 145) feedback.push('⚠️ HR slightly above Zone 2 (target 120–138). Slow down by 10–15 sec/km on the next easy run. Ego has no place in Zone 2.');
            else if (avgHR > 145) feedback.push('❌ HR too high for Zone 2 — this became a moderate session, which is the worst zone to train in. Slow to a walk on uphills next time. Zone 2 compliance trumps pace.');

            if (km > 0) {
              const planned_km = parseFloat((planned.match(/(\d+(?:\.\d+)?)\s*km/) || [])[1]) || 0;
              if (planned_km > 0 && km >= planned_km) feedback.push(`✅ Distance hit (${km} km ≥ planned ${planned_km} km). Consistent long run progression is your biggest marathon lever.`);
              else if (planned_km > 0 && km < planned_km * 0.9) feedback.push(`📏 Distance short (${km} km vs planned ${planned_km} km). If HR forced you to stop, that's the right call. Don't chase distance at the cost of Zone 2.`);
            }
          }

          if (isQuality) {
            if (avgHR > 0 && avgHR < 155) feedback.push('📊 HR suggests effort may have been too easy for a quality session. Quality runs should sit at LTHR (163–170 bpm) for tempo, or genuinely hard for intervals.');
            else if (avgHR >= 155 && avgHR <= 175) feedback.push('✅ HR in the right zone for quality work. This is where your running fitness actually improves.');
            else if (avgHR > 175) feedback.push('⚠️ HR very high — check if this was sustainable or if you went anaerobic. Quality runs should be hard but controlled.');
          }

          if (rpe !== null) {
            if (isZone2 && rpe > 6) feedback.push(`⚠️ RPE ${rpe} is high for an easy/long run — should feel like a 4–5. If it felt hard, you went too fast or are under-recovered.`);
            else if (isZone2 && rpe <= 5) feedback.push(`✅ RPE ${rpe} — exactly right for Zone 2. You should be able to hold a full conversation.`);
            else if (isQuality && rpe >= 7) feedback.push(`✅ RPE ${rpe} for a quality session — solid effort. Fergus would say: if it felt hard, it probably was quality work.`);
          }

          if (nextMilestone) {
            feedback.push(`🎯 Bench ${nextMilestone[1]} kg on Wk ${nextMilestone[0]} — stay disciplined on running volume, don't let it bleed into recovery for the gym. Polarised training: Zone 2 stays Zone 2.`);
          }

        } else {
          // ── GYM COACHING ──
          const exs = window.getExercises();
          const benchEx = exs.find(e => e.name && e.name.toLowerCase().includes('bp') || (e.name && e.name.toLowerCase().includes('bench')));

          // Check bench performance
          if (benchEx && benchEx.sets.length > 0) {
            const weights = benchEx.sets.map(s => parseFloat(s.weight)).filter(w => !isNaN(w));
            const reps = benchEx.sets.map(s => parseInt(s.reps)).filter(r => !isNaN(r));
            const topWeight = Math.max(...weights);
            const totalSets = weights.length;

            // Estimate e1RM using Epley: w * (1 + r/30)
            const e1RM = weights.map((w, i) => reps[i] ? w * (1 + reps[i] / 30) : 0).reduce((a, b) => Math.max(a, b), 0);

            // Planned bench weight from program
            const plannedBenchMatch = planned.match(/@(\d+(?:\.\d+)?)\s*kg/);
            const plannedWeight = plannedBenchMatch ? parseFloat(plannedBenchMatch[1]) : null;

            if (e1RM > 0 && nextMilestone) {
              const gap = nextMilestone[1] - e1RM;
              if (gap <= 5) feedback.push(`🔥 Estimated 1RM ~${Math.round(e1RM)} kg — you're within ${Math.round(gap)} kg of your Wk ${nextMilestone[0]} target (${nextMilestone[1]} kg). Stay the course, the wave is working.`);
              else if (gap <= 12) feedback.push(`📈 Estimated 1RM ~${Math.round(e1RM)} kg vs target ${nextMilestone[1]} kg on Wk ${nextMilestone[0]}. Gap of ${Math.round(gap)} kg — achievable. Trust the wave periodisation.`);
              else feedback.push(`📊 Estimated 1RM ~${Math.round(e1RM)} kg. ${nextMilestone[1]} kg on Wk ${nextMilestone[0]} is ambitious but keep the RPE honest — if sets feel like RPE 8+, don't force weight jumps.`);
            }

            if (plannedWeight && topWeight > 0) {
              if (topWeight >= plannedWeight) feedback.push(`✅ Bench weight on target (${topWeight} kg ≥ planned ${plannedWeight} kg). Execute the plan, don't improvise upward on a whim.`);
              else if (topWeight < plannedWeight * 0.95) feedback.push(`⚠️ Bench weight below plan (${topWeight} kg vs ${plannedWeight} kg planned). If RPE was high, this is useful data — the wave may need adjusting. If it was fatigue, prioritise sleep.`);
            }
          }

          // RPE analysis
          if (rpe !== null) {
            if (rpe >= 9) feedback.push(`⚠️ RPE ${rpe} — very hard session. If this was a planned intensity week, good. If not, watch recovery: the next session should feel easier or reduce load 5–10%.`);
            else if (rpe >= 7 && rpe <= 8) feedback.push(`✅ RPE ${rpe} — solid working session. This is the sweet spot for strength development in a hypertrophy/strength block.`);
            else if (rpe <= 5) feedback.push(`💡 RPE ${rpe} — session felt easy. Either this was a deload week (correct) or you have more in the tank. On non-deload weeks, add a set or push weight slightly.`);
          }

          // Sleep impact
          if (sleep !== null && sleep <= 5) feedback.push(`😴 Sleep score ${sleep}/10 — poor sleep blunts strength by up to 10%. If this is recurring, it's your biggest performance limiter. Don't push max weights on low sleep.`);

          // Week-specific advice
          const isDeloadWeek = [8,13,16,28].includes(wk);
          const isAttemptWeek = [9,14,17,29].includes(wk);
          if (isDeloadWeek) feedback.push(`🔽 Deload week — resist the urge to add volume. The goal is to arrive at next week's attempt feeling sharp, not tired. Less is more.`);
          if (isAttemptWeek) {
            const target = benchMilestones[wk];
            feedback.push(`🏋️ Attempt week! Target: ${target} kg. Warm up with singles at 60%, 75%, 85%, then go. One attempt only — don't grind a miss, it kills confidence.`);
          }

          if (nextMilestone && !isAttemptWeek) {
            const weeksOut = parseInt(nextMilestone[0]) - wk;
            feedback.push(`🎯 ${weeksOut} weeks to ${nextMilestone[1]} kg bench on Wk ${nextMilestone[0]}. Stay ambitious — Fergus would say: if the plan doesn't scare you slightly, it's not ambitious enough.`);
          }
        }

        // Sleep catch-all
        if (sleep !== null && sleep <= 4 && !feedback.some(f => f.includes('Sleep'))) {
          feedback.push(`😴 Sleep ${sleep}/10 is a red flag. Consider dropping intensity 10–15% today — training on poor sleep increases injury risk and blunts adaptation.`);
        }

        if (feedback.length === 0) feedback.push('📋 Log your sets, reps, weight and RPE to get specific coaching feedback.');

        document.getElementById('aiResponse').innerHTML = `
          <div class="card ai-card">
            <div class="ai-label">🧠 Coach Feedback — Wk ${wk}</div>
            <div class="ai-text">${feedback.map(f => `<div style="margin-bottom:10px;line-height:1.5;">${f}</div>`).join('')}</div>
          </div>
        `;
      });
    }

    function renderPRs() {
      const strFields = [
        { key: 'bench', label: 'Bench Press' },
        { key: 'squat', label: 'Back Squat' },
        { key: 'deadlift', label: 'Deadlift' },
      ];
      const runFields = [
        { key: 'km1', label: '1 km' },
        { key: 'mile', label: '1 Mile' },
        { key: '5k', label: '5K' },
        { key: '10k', label: '10K' },
        { key: 'hm', label: 'Half Marathon' },
        { key: 'marathon', label: 'Marathon' },
      ];

      let html = `
        <div class="prs-header">
          <div class="section-header mb-0">Personal Records</div>
          <button class="edit-btn ${state.editingPRs ? 'active' : ''}" id="toggleEdit">
            ${state.editingPRs ? 'Save' : 'Edit'}
          </button>
        </div>

              : `<span class="pr-value-display accent">${state.bodyWeight || '—'}</span>`
            }
          </div>
        </div>

        <div class="card">
          <div class="section-header">Strength</div>
          ${strFields.map(f => `
            <div class="pr-row">
              <span class="pr-label">${f.label}</span>
              ${state.editingPRs
                ? `<input type="text" class="form-input pr-input" data-pr="${f.key}" value="${state.prs[f.key] || ''}">`

              }
            </div>
          `).join('')}
        </div>

        <div class="historical-note">
          <span class="historical-flag">⚑ Historical</span> — PRs set 10+ years ago. Schedule is based on current fitness. Update as new times come in.
        </div>

        <div class="card">
          <div class="section-header">Running</div>
          ${runFields.map(f => `
            <div class="pr-row">
              <span class="pr-label">${f.label}</span>
              ${state.editingPRs
                ? `<input type="text" class="form-input pr-input" data-run-pr="${f.key}" value="${state.runPRs[f.key] || ''}">`
                : `<span class="pr-value-display accent">${state.runPRs[f.key] || '—'}</span>`
              }
            </div>
          `).join('')}
        </div>
      `;

      document.getElementById('prs-tab').innerHTML = html;

      document.getElementById('toggleEdit').addEventListener('click', async () => {
        if (state.editingPRs) {
          // Save
          const bwInput = document.getElementById('bodyWeightInput');
          if (bwInput) state.bodyWeight = bwInput.value;
          
          document.querySelectorAll('[data-pr]').forEach(input => {
            state.prs[input.dataset.pr] = input.value;
          });
          document.querySelectorAll('[data-run-pr]').forEach(input => {
            state.runPRs[input.dataset.runPr] = input.value;
          });
          
          await saveState();
        }
        state.editingPRs = !state.editingPRs;
        renderPRs();
      });
    }

    function renderSettings() {
      const apiKey = localStorage.getItem('anthropicApiKey') || '';
      const masked = apiKey ? apiKey.slice(0, 8) + '••••••••••••••••••••••••' + apiKey.slice(-4) : '';

      document.getElementById('settings-tab').innerHTML = `
        <div class="section-header">Account</div>
        <div class="card mb-12">
          <div style="font-size:13px;font-family:'DM Mono',monospace;color:var(--text);margin-bottom:4px;">${currentUser?.email || '—'}</div>
          <div style="font-size:10px;color:var(--text-muted);font-family:'DM Mono',monospace;margin-bottom:14px;">Data synced to Supabase · available on all devices</div>
          <button class="btn-primary" id="signOutBtn" style="background:var(--tag-red);">Sign Out</button>
        </div>

        <div class="section-header mt-16">Offline Sync</div>
        <div class="card mb-12">
          <div style="font-size:10px;color:var(--text-muted);font-family:'DM Mono',monospace;margin-bottom:12px;line-height:1.6;">
            Sessions are saved locally the moment you tap Save — even without internet.<br>
            When you're back online, pending sessions upload automatically.<br>
            Use the button below to force-upload now.
          </div>
          <button class="btn-primary" id="uploadPendingBtn">⬆ Upload pending sessions</button>
          <div id="uploadStatus" style="font-size:11px;font-family:'DM Mono',monospace;color:var(--success);margin-top:8px;display:none;"></div>
        </div>

        <div class="section-header mt-16">AI Coach</div>
        <div class="card">
          <div style="font-size:10px;color:var(--text-muted);font-family:'DM Mono',monospace;margin-bottom:10px;line-height:1.6;">
            Paste your Anthropic API key to enable the 🧠 AI Coach button.<br>
            Stored locally in this browser only — never sent anywhere except api.anthropic.com.<br><br>
            Get a key at <span style="color:var(--accent)">console.anthropic.com</span>
          </div>
          ${apiKey
            ? `<div style="font-size:11px;font-family:'DM Mono',monospace;color:var(--success);margin-bottom:10px;">✓ Key saved: ${masked}</div>`
            : `<div style="font-size:11px;font-family:'DM Mono',monospace;color:var(--tag-orange);margin-bottom:10px;">⚠ No key set — AI Coach disabled</div>`
          }
          <input type="password" class="form-input" id="apiKeyInput" placeholder="sk-ant-api03-..." style="margin-bottom:8px;" value="${apiKey}">
          <div class="btn-row">
            <button class="btn-primary" id="saveApiKey">Save Key</button>
            ${apiKey ? `<button class="btn-secondary" id="clearApiKey" style="color:var(--tag-red)">Clear</button>` : ''}
          </div>
          <div id="apiKeySaved" style="display:none;font-size:11px;color:var(--success);font-family:'DM Mono',monospace;margin-top:8px;">✓ Saved — AI Coach is now active</div>
        </div>
      `;

      // Upload pending button
      const uploadBtn = document.getElementById('uploadPendingBtn');
      if (uploadBtn) {
        updateSyncBadge(); // set initial state
        uploadBtn.addEventListener('click', async () => {
          uploadBtn.textContent = 'Uploading…';
          uploadBtn.disabled = true;
          const remaining = await flushQueue();
          const statusDiv = document.getElementById('uploadStatus');
          if (remaining === 0) {
            statusDiv.textContent = '✓ All sessions synced to Supabase';
            statusDiv.style.color = 'var(--success)';
          } else {
            statusDiv.textContent = `⚠ ${remaining} session(s) still pending — check connection`;
            statusDiv.style.color = 'var(--tag-red)';
          }
          statusDiv.style.display = 'block';
          updateSyncBadge();
        });
      }

      document.getElementById('signOutBtn').addEventListener('click', async () => {
        await sb.auth.signOut();
      });

      document.getElementById('saveApiKey').addEventListener('click', () => {
        const val = document.getElementById('apiKeyInput').value.trim();
        if (val) {
          localStorage.setItem('anthropicApiKey', val);
          document.getElementById('apiKeySaved').style.display = 'block';
          setTimeout(() => renderSettings(), 1200);
        }
      });

      const clearBtn = document.getElementById('clearApiKey');
      if (clearBtn) {
        clearBtn.addEventListener('click', () => {
          localStorage.removeItem('anthropicApiKey');
          renderSettings();
        });
      }
    }
    // ═══════════════════════════════════════════════════════════════
    function initApp() {
      // Apply theme
      document.body.dataset.theme = state.theme;
      document.getElementById('themeToggle').textContent = state.theme === 'light' ? '☽ Dark' : '☀ Light';
      setSyncDot('synced');

      // Theme toggle
      document.getElementById('themeToggle').addEventListener('click', async () => {
        state.theme = state.theme === 'light' ? 'dark' : 'light';
        document.body.dataset.theme = state.theme;
        document.getElementById('themeToggle').textContent = state.theme === 'light' ? '☽ Dark' : '☀ Light';
        document.querySelector('meta[name="theme-color"]').content = state.theme === 'light' ? '#f7f4ef' : '#0f0d0a';
        await saveState();
      });

      // Tab navigation
      document.querySelectorAll('.tab').forEach(tab => {
        tab.addEventListener('click', () => {
          document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
          tab.classList.add('active');
          document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
          document.getElementById(`${tab.dataset.tab}-tab`).classList.add('active');
          state.tab = tab.dataset.tab;
          if (state.tab === 'program') state.programView = 'weeks';
          render();
        });
      });

      render();
    }

    function showLoginScreen() {
      document.getElementById('loginScreen').style.display = 'flex';
      let isSignUp = false;

      document.getElementById('loginBtn').addEventListener('click', async () => {
        const email = document.getElementById('loginEmail').value.trim();
        const password = document.getElementById('loginPassword').value;
        const btn = document.getElementById('loginBtn');
        const errDiv = document.getElementById('loginError');
        errDiv.style.display = 'none';
        btn.disabled = true;
        btn.textContent = isSignUp ? 'Creating account…' : 'Signing in…';

        let result;
        if (isSignUp) {
          result = await sb.auth.signUp({ email, password });
        } else {
          result = await sb.auth.signInWithPassword({ email, password });
        }

        if (result.error) {
          errDiv.textContent = result.error.message;
          errDiv.style.display = 'block';
          btn.disabled = false;
          btn.textContent = isSignUp ? 'Create Account' : 'Sign In';
        }
        // Success: onAuthStateChange will handle the rest
      });

      document.getElementById('loginToggle').addEventListener('click', () => {
        isSignUp = !isSignUp;
        document.getElementById('loginBtn').textContent = isSignUp ? 'Create Account' : 'Sign In';
        document.getElementById('loginToggle').textContent = isSignUp ? 'Already have an account? Sign in' : 'No account yet? Sign up';
        document.getElementById('loginError').style.display = 'none';
      });

      // Allow Enter key
      ['loginEmail','loginPassword'].forEach(id => {
        document.getElementById(id).addEventListener('keydown', e => {
          if (e.key === 'Enter') document.getElementById('loginBtn').click();
        });
      });
    }

    function render() {
      if (state.tab === 'home') renderHome();
      else if (state.tab === 'program') renderProgram();
      else if (state.tab === 'prs') renderPRs();
      else if (state.tab === 'settings') renderSettings();
    }

    // ── Auth entry point ──
    document.addEventListener('DOMContentLoaded', async () => {
      showLoginScreen();

      sb.auth.onAuthStateChange(async (event, session) => {
        if (session?.user) {
          currentUser = session.user;
          await loadProfile();
          document.getElementById('loginScreen').style.display = 'none';
          initApp();
        } else {
          currentUser = null;
          document.getElementById('loginScreen').style.display = 'flex';
        }
      });
    });
  </script>
</body>
</html>
